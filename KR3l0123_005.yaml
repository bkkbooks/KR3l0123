body:
  text: 博物志卷四殷三仁微子箕子比干文王四友南宮括散宜生閎夭太顛仲尼四友顏淵子貢子路子張春秋哀公十有四年春西狩獲麟公羊傳曰有以告者孔子曰孰為來哉孰為來哉左傳曰叔孫氏之車子鉏商獲麟以為不祥司馬遷云無堯以天下讓許由事揚雄亦云誇大者為之楊雄又云無仙道桓談亦同禮記曰孔子少孤不知其父墓母亡問於鄒曼父之母乃合葬於防防墓又崩門人後至孔子問來何遲門人實對孔子不應如是者三乃潸然流涕而止曰古不修墓蔣濟何晏夏侯玄王肅皆云無此事注記者謬時賢咸從之肉刑明王之制荀卿每論之漢興文帝感太倉公女之言而廢之班固著論宜復迄漢末魏初陳紀又論宜申古制孔融云不可復魏武帝輔漢欲申之鍾繇王朗不同遂寢夏侯玄李勝曹羲丁謐建私議各有彼此多云時未可復故遂寢焉漢興多瑞應至武帝之世特甚麟鳳數見王莽時郡國多稱瑞應歲歲相尋皆由順時之欲承旨求媚多無實應乃使人猜疑三讓一曰禮讓二曰固讓三曰終讓上公備物九錫一大輅戎車各一玄牡二駟二袞冕之服赤舄副之三軒懸之樂六佾之舞四朱戶以居五納陛以登六虎賁之士三百人七鈇鉞各一八彤弓一彤矢百玈弓十玈矢千九秬鬯一卣圭瓚副之舊洛陽字作水邊各漢火行也忌水故去水而加佳又魏於行次為土水得土而流土得水而柔故復去佳加水變雒為洛焉堯時有屈佚草生於庭佞人入朝則屈而指之一名指佞草何以知還風也假令東風雲反從西來詵詵而疾此不旋踵立西風矣所以然者諸風皆從上下或薄於雲雲行疾下雖有微風不能勝上上風來到反矣盜跖冢在大陽縣西趙鞅冢在臨水縣界冢上氣成樓閣曹參字敬伯蔡伯喈母袁公熙妹曜卿姑也余友人下邳陳德龍謂余言曰靈光殿賦南郡宜城王子山所作子山嘗之泰山從鮑子真學算過魯國而覩殿賦之還歸本州溺死湘水時年二十許也南荊賦江陵有臺甚大而唯有一柱衆梁皆共之徐州人謂塵土為蓬堁吳人謂坺坱古駿馬有飛兔騕裊周穆王八駿赤驥飛黃白蟻華騮騄耳騟騧渠黃盜驪唐成公有驌驦項羽有騅馬周穆王有犬名斄毛曲晉靈公有周狗名獒韓國有黑犬名盧宋有駿犬曰㹱犬四尺為獒寶劍名純鉤湛廬豪曹魚腸巨闕五劍皆歐冶子所作龍淵太阿工布三劍皆楚王令風胡子因吳王請干將歐冶子作干將陽龜文莫邪陰漫理此二劍吳王使干將作莫邪干將妻也蔡雍有書萬卷漢末年載數車與王粲粲亡後相國椽魏諷謀反粲子與焉既被誅雍所與粲書悉入粲族子業字長緒即正宗父正宗即輔嗣兄也初粲與族兄凱避地荊州依劉表表有女表愛粲才欲以妻之嫌其形陋通率乃謂曰君才過人而體貌非女壻才凱有風貌乃妻凱生業即女所生太丘長陳實實子鴻臚卿紀紀子司空群群子泰四世於漢魏二朝並有重名而其德漸漸小減故時人為其語曰公慚卿卿慚長聖人制作曰經賢者著述曰傳曰章句曰解曰論曰讀鄭玄注毛詩曰箋不解此意或云毛公嘗為北海郡守玄是此郡人故以為敬何休注公羊傳云何氏學又不能解者或答云休謙詞受學於師乃宣此義不出於己此言為允漢承秦群臣上書皆曰昧死言王莽盜位慕古去昧死曰稽首光武因而不改漢末喪亂絶無金石之樂魏武帝至漢中得杜夔舊法始復設軒懸鐘磬至於今用之受於夔也漢末喪亂絶無玉佩魏侍中王粲識舊佩始復作之今之玉佩受法於王粲也古者男子皆絲衣有故乃素服又有冠無幘故雖凶事皆著冠也薑原嗣祠在墉城長安西南三十里周自后稷至于文武皆都關中號為宗周秦為阿房殿在長安西南二十里殿東西千步南北三百步上可以坐萬人庭中受十萬人二世為趙高所殺於宜春宮在杜城南三里葬於旁始皇陵在驪山之北高數十丈周回六七里今在陰盤縣界此陵雖高大不足以消六十萬人積年之功其用功力或隱不見不見者驪山水泉本北流者陂障使東西流又此山有土無石運取大石於渭南諸山故歌曰運石甘泉口渭水為不流千人唱萬人歌今陵下餘石大如塸其餘功力皆如此類

body:
  text: 博物志卷一河圖括地象曰地南北三億三萬五千五百里地坻之位起形高大者有崑崙山廣萬里高萬一千里神物之所生聖人仙人之所集也出五色雲氣五色流水其白水東南流入中國名曰河也其山中應于天最居中八十城布繞之中國東南隅居其一分是好城也崑崙山之東北地轉下三千六百里有八玄幽都方二十萬里地下有四柱四柱廣十萬里地有三千六百軸犬牙相牽名山大川孔穴相內和氣所出則生石脂玉膏食之不死神龍靈龜行於穴中矣東方有螳螂沃燋防風氏長三丈短人處九寸遠夷之名雕題黑齒穿胸儋耳天竺岐首地以名山為之輔佐石為之骨川為之脈草木為之毛土為之肉三尺以上為糞三尺以下為地重陰之性也考靈耀曰地有四遊冬至地行上北而西三萬里夏至地行下南而東三萬里春秋二分其中矣地恆動不止譬如人在大舟中閉牖而坐舟行而人不覺七戎六蠻九夷八狄形類不同揔而言之謂之四海言皆近海海之言晦昏無所覩也漠北廣遠中國人鮮有至北海者漢使驃騎將軍霍去病北伐單于至瀚海而還有北海明矣漢使張騫渡西海至大秦大秦之西鳥遲國鳥遲國之西復言有海西海之濱有小崑崙高萬仞方八百里東海廣漫未聞有渡者史記封禪書云齊宣燕昭遣人乘舟入海有蓬萊方丈瀛洲三神山神人所集欲採仙藥蓋言先有至之者其鳥獸皆白金銀為宮闕悉在渤海中去人不遠也南海短狄未及西南夷以窮斷今渡南海至交趾者不絶也中國之城左濱海右通流沙方而言之萬五千里面二千五百里東至蓬萊西至隴右后跨京北前及衡嶽若計共四隅有三億之餘降朝鮮岷山東治可西也隴川以南及北海之國此是堯舜土萬里及湯時七千里此後亦無常隨德優劣也東方少陽日月所出山谷清朗其人佼好西方少陰日月所入其土窈冥其人高鼻深目多毛南方太陽土下水淺其人大口多傲北方太陰土平廣深其人廣面縮頸中央四戰風雨交山谷峻其人端正堯別九州舜為十二五嶽華岱恆衡嵩四瀆河出崑崙墟江出岷山濟出王屋淮出桐柏八流亦出名山渭出鳥鼠漢出嶓冢洛出熊耳潁出少室汝出燕泉泗出陪尾沔出月台沂出太山水有五色有濁有清河淮濁江濟清南陽有清冷之水丹水泉水汝南有黃水華山有黑水濘水淵或生明珠而崖不枯山澤通氣以興雷雲氣觸石膚寸而合不崇朝以雨山有夔其形如鼓一足如蠡澤有委蛇狀如轂長如轅見之者霸昔夏禹觀河見長人魚身出曰吾河精豈河伯也馮夷華陰潼鄉人也得仙道化為河伯豈道同哉仙人乘龍虎水神乘魚龍其行恍惚萬里如室水之怪為龍罔象木石之怪為夔魍魎土之怪為墳羊火之怪為宋無忌地性含水山土泉者引地氣也山有沙者生金有穀者生玉名山生神芝不死之草上芝為車馬中芝為人形下芝為六畜土山多雲鐵山多石五土所宜黃白宜種禾黑墳宜麥黍蒼赤宜菽芋下泉宜稻得其宜則利百倍有山者採有水者漁山氣多男澤氣多女平衍氣仁高凌氣犯叢林氣躄故擇其所居居在高中之平下中之高則産好人居無近絶溪群冢狐蟲之所近此則死氣陰匿之處也石者金之根甲石流精以生水水生木木含火援神契曰五嶽之精雄聖四瀆之精仁明河者水之伯上應天漢太山天帝孫也主召人魂東方萬物始成故知人生命之長短老子云萬民皆付西王母唯王聖人真人仙人道人之命上屬九天君耳五嶽視三公四瀆視諸侯諸侯賞封內名山大川者通靈助化位相亞也故地動臣叛名山崩王道訖川竭神去國隨已亡海投九仞之魚流水涸國之大誡也澤浮舟川水溢臣盛君衰百川沸騰山冢卒崩高岸為谷深谷為陵小人握命君子陵遲白黑不別大亂之徵也江河水赤占曰泣血道路涉蘇於何以處也和氣相感則生朱草山出象車澤出神馬陵出黑丹阜出土怪江出大貝海出明珠仁主壽昌民延壽命天下太平秦前有藍田之鎮後有胡苑之塞左崤函右隴蜀西通流沙險阻之國也蜀漢之土與秦同域南跨卭笮北阻褒斜西即隈礙隔以劍閣窮險極峻獨守之國也周在中樞西阻崤谷東望荊山南面少室北有太嶽三河之分雷風所起四險之國武王克殷定鼎郟鄏以為東都也魏前枕黃河背漳水瞻王屋望梁山有藍田之寶浮池之淵趙東臨九州西瞻恆嶽有沃瀑之流飛壺井陘之險至于潁陽涿鹿之野燕卻背沙漠進臨易水西至君都東至於遼長蛇帶塞險陸相乘也齊南有長城巨防陽關之險北有河濟足以為固越海而東通于九夷西界岱嶽配林之峻險固之國也魯前有淮水後有岱嶽蒙羽之向洙泗之流大野廣土曲阜尼丘宋北有泗水南迄淮濄有孟諸之澤碭山之塞也楚後背方城前及衡嶽左則彭蠡右則九疑有江漢之流實險阻之國也南越之國與楚為鄰五嶺已前至于南海負海之邦交趾之土謂之南裔吳左洞庭右彭蠡後濱長江南至豫章水界險阻之國也東越通海處南北尾閭之間三江流入南海通東治山高海深險絶之國也衛南跨于河北得淇水南過濮上左通黎澤右指黎山讚曰地理廣大四海八方遐遠別域略以難詳侯王設險守固保疆遠遮川塞近備城隍司察姦非禁禦不良勿恃危厄恣其淫荒無德則敗有德則昌安屋猶懼乃可不亡進用忠直社稷永康教民以孝舜化以彰

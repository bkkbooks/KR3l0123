body:
  text: 博物志卷二凡月暈隨灰畫之隨所畫而闕麒麟鬭而日蝕鯨魚死而彗星出嬰兒號婦乳出蠶弭絲而商弦絶龍肉以醯漬之則文章生人食燕肉不可入水為蛟龍所吞人食終葵為狗所齧瘡不差或致死鼠食巴豆三年重三十斤婦人妊身不欲令見醜惡物異類鳥獸食當避其異常味不欲令見熊羆虎豹及狂鳥秩秩雉不食牛心白犬肉鯉魚頭席不正不坐割不正不食聽誦詩書諷詠之音不聽淫聲不視邪色以此産子必賢明端正壽考所謂父母胎教之法故古者婦人妊娠必慎所感感於善則善感於惡則惡矣妊娠者不可啖兔肉又不可見兔令兒唇缺又不可啖生薑令兒多指異説云瞽叟夫婦凶頑而生舜叔梁紇淫夫也徵在失行也加又野合而生仲尼焉其在有胎教也五月五日埋蜻蜓頭於西向戶下埋至三日不食則化成青珠又云埋於正中門莊子曰地三年種蜀黍其後七年多蛇鬭戰死亡之處其人馬血積年化為磷磷著地及草木如露略不可見行人或有觸者著人體便有光拂拭便分散無數愈甚有細吒聲如炒豆唯靜住良久乃滅後其人忽忽如失魂經日乃差今人梳頭脫著衣時有隨梳解結有光者亦有吒聲白鷁雄雌相視則孕或曰雄鳴上風雌鳴下風則亦孕兔舐毫望月而孕口中吐子舊有此説余目所見也馬食穀則足重不能行鴈食粟則翼重不能飛山居之民多癭腫疾由於飲泉之不流者今荊南諸山郡東多此疾瘇由踐土之無鹵者今江外諸山縣偏多此病也人啖豆三年則身重行止難啖榆則眠不欲覺啖麥令人多力健行飲真茶令人少眠人常食小豆令人肥肌粗燥食燕麥令人骨節斷解山雞有美毛自愛其色終日映水目眩則溺死鸐雉長尾雨雪惜其尾栖高樹杪不敢下食往往餓死時魏景初中天下所説鸛水鳥也伏卵時數入水卵冷則不沸取礜石周圍繞卵以助暖氣故方術家以鸛巢中礜石為真物燒馬蹄羊角成灰春夏散著濕地生羅勒大腰無雄龜鼉類也無雄與蛇通氣則孕細腰無雌蜂類也取桑蠶或阜螽子咒而成子詩云螟蛉之子蜾螺負之是也煎麻油水氣盡無煙不復沸則還冷可內手攪之得水則焰起散卒不滅此亦試之有驗燒白石作白灰既訖積著地經日都冷遇雨及水澆即更燃煙焰起蠐螬以背行快於用足江南山溪水中有射工蟲甲蟲之類也長一二寸口中有弩形以氣射人影隨所著處發瘡不治則殺人今蠼螋蟲溺人影亦隨所著處生瘡百足一名馬蚿中斷成兩段各行而去蜥蜴或名蝘蜓以器養之食以朱砂體盡赤所食滿七斤治搗萬杵以點女人支體終身不滅有房室事則滅故號守宮傳云東方朔語漢武帝試之有驗削冰令圓舉以向日以艾於後承其影則得火取火法如用珠取火多有説者此未試陳葵子微火炒令爆吒散者熱地遍踏之朝種暮生遠不過經宿耳陳葵子秋種覆蓋令經冬不死春有子也鳥雌雄不可別翼右掩左雄左掩右雌二足而翼謂之禽四足而毛謂之獸人藉帶眠者則夢蛇鳥𠾑人之髮夢飛鵲巢門戶避太歲此非才智任自然也蠶三化先孕而後交不交者亦産子子後為蠶皆無眉目易傷收採亦薄蟹漆相合成水九竅者胎生八竅者卵生龜鱉皆此類咸卵生影伏婦人妊娠未滿三月著壻衣冠平旦左繞井三匝映詳影而去勿反顧勿令人知見必生男荊州極西南界至蜀諸民曰獠子婦人妊娠七月而産臨水生兒便置水中浮則收養之沈便棄之然千百多浮既長皆拔去上齒牙各一以為身飾神仙傳曰説上據辰尾為宿歲星降為東方朔傅説死後有此宿東方生無歲星漢淮南王謀反被誅亦云得道輕舉鉤弋夫人被殺於雲陽而言尸解柩空桓談新論説方士有董仲君有罪繫獄佯死臭爛目陷蟲出既而復生魏時方士甘陵甘始廬江有左慈陽城有郤儉始能行氣導引慈曉房中之術儉善辟穀不食悉號三百歲人凡如此之徒武帝皆集之於魏不使遊散甘始老而少容曹子建密問其所行始言本師姓韓字世雅嘗與師於南海作金投數萬斤於海又取鯉魚一雙令其一著藥俱投沸膏中有藥者奮尾鼓鰓遊行沈浮有若處淵其無藥者已熟而可食言此藥去此踰萬里己不可行不能得也齊桓公出因與管仲故道自燉煌西涉流沙往外國流沙千餘里中無水時時有伏流處人莫能知皆乘駱駝駱駝知水脈過其處輒停不肯行以足踏地人於其踏處掘之輒得水諸遠方山郡幽辟處出蜜蠟人往往以桶聚蜂每年一取人有山行墮深澗者無出路飢餓分死左右見龜蛇甚多朝暮引頸向東方人因伏地學之遂不飢體殊輕便能登巖岸經數年後竦身舉臂遂超出澗上即得還家顏色悅懌頗更黠惠勝故還食穀啖滋味百餘日中復本質天門郡有幽山峻谷谷在上人有從下經過者忽然踊出林表狀如飛仙遂絶迹年中如此甚數遂名此處為仙谷有樂道好事者入此谷中洗沐以求飛仙往往得去有長意思人疑必妖怪乃以大石自墜牽一犬入谷中犬復飛去其人還告鄉里募數十人執杖擖山草伐木至山頂觀之遙見一物長數十丈其高隱人耳如簸箕格射刺殺之所吞人骨積在左右有成封蟒開口廣尺餘前後失人皆此蟒氣所吸上於是此地遂安隱無患漢末關中大亂有發前漢時冢者宮人猶活既出平復如舊魏郭后愛念之録著宮內常置左右問漢時宮中事説之了了皆有次序后崩哭泣過禮遂死焉漢末發范明友奴冢奴猶活明友霍光女壻説光家事廢立之際多與漢書相應此奴常遊走於民間無止住處今不知所在或云尚在余聞之於人可信而目不可見也景初中蒼梧吏到京云廣州西南接交州數郡桂林晉興寧浦間人有病將死便有飛蟲大如小麥或云有甲嘗伺病者居舍上候人氣絶來食亡者雖復撲殺有斗斛而來者如風雨前後相尋續不可斷截肌肉都盡唯餘骨在便去盡貧家無相纏者或殯殮不時皆受此弊有物力者則以衣服布帛五六重裹亡者此蟲惡梓木氣即以板鄣防左右并以作器此蟲便不敢近也入交界更無轉近郡亦有但微少耳

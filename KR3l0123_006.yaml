body:
  text: 博物志卷五天地初不足故女媧氏練五色石以補其闕斷鼇足以立四極其後共工氏與顓頊爭帝不得而怒觸不周之山折天柱絶地維故天傾西北日月星辰就焉地不滿東南故百川水潦歸焉越之東有輒休之國其長子生則解而食之謂之宜弟父死則負其母而棄之言鬼妻不可與同居楚之南有炎人之國其親戚死㱙其肉而棄之然後埋其骨乃為孝也之西有義渠國其親戚死聚柴積薪而焚之熏之即煙上謂之登遐然後為孝此上以為政下以為俗中國未足為非也此事見墨子孔子東遊見二小兒辨鬭問其故一小兒曰我以日始出時去人近而日中時遠也一小兒曰以日初出時遠而日中時近一小兒曰日初出時大如車蓋及日中則如盤盂此不為遠者小而近者大乎一小兒曰日初出滄滄涼涼及其中如探湯此不為近者熱而遠者涼乎孔子不能決兩小兒曰孰謂汝多知乎亦出列子詹何以獨繭絲為綸芒針為鉤荊條為竿剖粒為餌引盈車之魚於百仞之淵汩流之中綸不絶鉤不申竿不撓薛談學謳於秦青未窮青之技於一日遂辭歸秦青不止餞於郊衢撫節悲歌聲震林木響遏行雲薛談乃謝求返終身不敢言歸秦青顧謂其友曰昔韓娥東之齊匱糧過雍門鬻歌假食既去而餘響繞梁三日不絶左右以其人弗去過逆旅逆旅人辱之韓娥因曼聲哀哭一里老幼悲愁垂淚相對三日不食遽而追之娥還復為曼聲長歌一里老幼喜歡抃舞弗能自禁乃厚賂而遣之故雍門人至今善歌哭效娥之遺聲也趙襄子率徒十萬狩於中山藉艿燔林扇赫百里有人從石壁中出隨煙上下若無所經涉者襄子怪而留之徐察之乃人也問其奚道而處石奚道而入火其人曰奚物為石奚物為火襄子曰而嚮之所出者石也而嚮之所涉者火也其人曰不知也魏文侯聞之問於子夏曰彼何人哉子夏曰以商所聞於夫子和者同於物物無得而傷閡者遊金石之間及蹈於水火皆可也文侯曰吾子奚不為之子夏曰刳心去智商未能也非不能也雖然試語之而有暇矣文侯曰夫子奚不為之子夏曰夫子能而不為文侯不悅思士不妻而感思女不夫而孕后稷生乎巨跡伊尹生乎空桑燕太子丹質於秦秦王遇之無禮不得意思欲歸請於秦王王不聽謬言曰令烏頭白馬生角乃可丹仰而歎烏即頭白俯而嗟馬生角秦王不得已而遣之為機發之橋欲陷丹丹驅馳過之而橋不發遁到關關門不開丹為雞鳴於是衆雞悉鳴遂還歸昔劉玄石於中山酒家酤酒酒家與千日酒忘言其節度歸至家大醉而家人不知以為死也具棺殮葬之酒家計千日滿乃憶玄石前來酤酒醉當醒耳往視之云玄石亡來三年已葬於是開棺醉始醒俗云玄石飲酒一醉千日西域有蒲萄酒積年不敗彼俗云可至十年飲之醉彌月乃解古之善射者甘蠅蠅之弟子曰飛衛更羸謂魏王曰臣能射為虛發而下鳥王曰然則射可至於此乎曰可間有鳥從東方來羸虛發而下之也按太行山而北去不知山所限極處亦如東海不知所窮盡也成王冠周公使祝雍曰辭達而勿多也祝雍曰近於民遠於佞近於義嗇於時惠於財任賢使能孝昭帝冠辭曰陛下摛顯先帝之光耀以奉皇天之嘉祿欽順仲春之吉日遵並大道之郊域康阜萬國之休靈始加昭之元服推遠童稚之幼志弘積文武之寵德肅勤高祖之清廟六合之內靡不蒙德歲歲與天無極右孝昭周成王冠辭止雨祝曰天生五穀以養人民今天雨不止用傷五穀如何如何社靈幸為止雨殺牲以賽神靈雨則不止鳴鼓攻之朱絲繩縈而脅之請雨祝曰皇皇上天照臨下土集地之靈神降甘雨庶物群生咸得其所周時德澤盛蒿大以為宮柱名曰蒿宮

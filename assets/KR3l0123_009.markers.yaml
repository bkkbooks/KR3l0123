  - {type: variant, offset: 224, length: 2, content: 豫章, WYG: 昔有洛氏宫室無常囿池廣大人民困匱商伐之有洛以亡神仙傳曰説上據箕尾為宿嵗星降為東方朔傅説死後有此宿東方生無嵗星曽子曰好吾者知吾美矣惡我者知吾惡矣思士不妻而感思女不夫而孕后稷生乎巨跡伊尹生乎空桑箕子居朝鮮其後伐燕復之朝鮮亡入海為鮮國師兩妻黒色珥兩青蛇蓋勾芒也漢興多瑞應至武帝之世特甚麟鳯數見王莽時}

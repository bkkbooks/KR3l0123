  - {type: variant, offset: 577, length: 201, content: 泰山神女嫁於東海神童今灌壇令當道廢我行我行必有大風雨而太公有德吾不敢以暴風雨過是毀君德文王明日召太公三日果有疾風暴雨從太公邑外過晉文公出大蛇當道如拱文公反修德使吏守蛇吏夢天使殺蛇曰何故當聖君道覺而視蛇則自死也齊景公伐宋過泰山夢二人怒公謂太山之神晏子謂宋祖湯與伊尹也為言其狀湯晳容多鬚伊尹黑而短即所夢也景公進軍不聽軍鼓毀公恐散軍不果伐宋澹臺子羽渡河齎千金之璧河伯欲之至陽侯波起兩鮫挾船子羽左操璧右操劍擊鮫, WYG: 龜蓍}

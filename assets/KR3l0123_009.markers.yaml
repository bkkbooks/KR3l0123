  - {type: variant, offset: 224, length: 2, content: 豫章, krp: 昔有洛氏宫室無常囿池廣大人民困匱商伐之有洛以亡神仙傳曰説上據箕尾為宿嵗星降為東方朔傅説死後有此宿東方生無嵗星曽子曰好吾者知吾美矣惡我者知吾惡矣思士不妻而感思女不夫而孕后稷生乎巨跡伊尹生乎空桑箕子居朝鮮其後伐燕復之朝鮮亡入海為鮮國師兩妻黒色珥兩青蛇蓋勾芒也漢興多瑞應至武帝之世特甚麟鳯數見王莽時}
  - {type: variant, offset: 227, length: 2, content: 衣冠, WYG: 國多稱瑞應嵗嵗相尋皆由順時}
  - {type: variant, offset: 227, length: 2, content: 衣冠, krp: 國多稱瑞應嵗嵗相尋皆由順時}
  - {type: variant, offset: 230, length: 0, content: '', WYG: 欲承㫖求媚多無實應乃使}
  - {type: variant, offset: 230, length: 0, content: '', krp: 欲承㫖求媚多無實應乃使}
  - {type: variant, offset: 231, length: 266, content: 有數婦暴面市廛爭分銖以給其夫輿馬衣資及舉孝廉更取富者一切皆給先者雖有數年之勤婦子滿堂室猶放黜以避後人盧植云代城始築立板幹一旦亡西南四五十里板於澤中自立結葦為門因就營築焉其城圓匝而不方周三十七里為九門故城處呼曰東城漢滕公薨求葬東都門外公卿送喪駟馬不行踣地悲鳴以足跑地掘馬蹄下地得石槨有銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室遂葬焉衛靈公葬得石槨銘曰不馮其子靈公奪我里漢西都時南宮寢殿內有醇儒王史威長死葬銘曰明明哲士知存知亡崇隴原舋非寧非康不封不樹作靈乘光厥銘何伊王史威長列傳云聶政刺韓相白虹為之貫日要離刺慶忌彗星襲月專諸刺吳王僚鷹擊殿上, WYG: 猜疑}

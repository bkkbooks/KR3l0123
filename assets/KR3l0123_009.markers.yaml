  - {type: variant, offset: 990, length: 840, content: 徐界中今見有狗壟偃王既襲其國仁義著聞欲舟行上國乃通溝陳蔡之間得朱弓朱矢以已得天瑞遂因名為號自稱徐偃王江淮諸侯皆伏從伏從者三十六國周王聞之遣使乘駟一日至楚使伐之偃王仁不忍鬭害其民為楚所敗北走彭城武原縣東山下百姓隨之者以萬數後遂名其山為徐山山上立石室廟有神靈民人祈禱今皆見存京兆都張潛客居遼東還後為駙馬都尉關內侯表言故為諸生太學時聞故太尉常山張顥為梁相天新雨後有鳥如山䧿飛翔近地市人擲之稍下墮地民爭取之即為一圓石言縣府顥令搥破之得一金印文曰忠孝侯印顥表上之藏於官庫後議郎汝南樊行夷校書東觀表上言堯舜之時舊有此官今天降印宜可復置孝武建元四年天雨粟孝元竟寧元年南陽山都雨穀小者如黍粟而青黑味苦大者如大豆赤黃味如麥下三日生根葉狀如大豆初生時也大司馬曹休所統中郎謝璋部曲義兵奚儂息女年四歲病歿故埋葬五日復生太和三年詔令休使父母持送女來視之其年四月三日病死四日埋藏至八日同墟人採桑聞兒啼聲即語儂妻往發視兒生活今能飲食如常結胸國有滅蒙鳥奇肱國其民善為機巧以殺百禽能為飛車從風遠行湯時西風至吹其車至豫州湯破其車不以視民十年東風至乃復作車遣返其國去玉門關四萬里比翼鳥一青一赤在參嵎山羽民國民有翼飛不遠多鸞鳥民食其卵去九疑四萬三千里驩兜國其民畫似仙人帝堯司徒驩兜民常捕魚海島中人面鳥喙去南國萬六千里畫似仙人也厭火國民火出口中畫似猿猴黑色三苗國昔唐堯以天下讓於虞舜三苗之君非之帝殺之有苗之民叛浮入南海為三苗國穿胸國昔禹平天下會諸侯於會稽之野防風氏後到殺之夏德盛二龍降庭禹使范成光御之以行域外既周而還至南海經房風房風氏之二臣以塗山之戮見禹便怒而射之迅雷風雨二龍昇去二臣恐以刃自貫其心而死禹哀之乃拔其刃療以不死之草是為穿胸民交趾民其為人交足在穿胸東孟舒國民人首鳥身其先主為虡氏訓百禽夏后之世始食卵孟舒去之鳳皇隨焉止些山多竹長千仞鳳食其實去九疑萬八千里員丘山上有不死樹食之乃壽有赤泉飲之不老多大蛇為人害不得居也蒙雙民昔高陽氏有同產而為夫婦帝放之此野相抱而死神鳥以不死草覆之七年男女皆活同頸二頭四手是蒙雙民大人國, WYG: 處}

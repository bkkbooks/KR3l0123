  - {type: variant, offset: 337, length: 303, content: 媚於人胡粉白石灰等以水和之塗鬢鬚不白塗訖著油單裹令溫煗候欲燥未燥間洗之早則不得著晚則多折用煖湯洗訖澤塗之欲染當熱洗髮鬚有膩不著藥臨染時亦當拭鬚燥溫之柔利國人一手一足反卷曲張騫使西域還乃得胡桃種江陵有貙人能化為虎俗又曰虎化為人好著紫葛衣足無踵泰山一曰天孫言為天帝孫也主召人魂魄東方萬物始成故主人生命之長短洞庭君山帝之二女居之曰湘夫人又荊州圖語曰湘君所遊故曰君山也有道與吳包山潛通上有美酒數斗得飲者不死漢武帝齋七日遣男女數十人至君山得酒欲飲之東方朔曰臣識此酒請視之因一飲致盡帝欲殺之朔乃曰殺朔若死此為不驗以其有驗殺亦不死乃赦之庭州灞水以金銀鐵器盛之皆漏唯瓠葉則不漏太原晉陽以北生屏風草扶海洲上有草焉名蒒其實食之, WYG: ''}

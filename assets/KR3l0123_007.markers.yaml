  - {type: variant, offset: 104, length: 0, content: '', WYG: 太公為灌壇令武王夢婦人當道夜哭問之曰吾是東海神女嫁于西海神童今灌壇令當道廢我行我行必有大風雨而太公有德吾不敢以暴風雨過以毁君德武王明日召太公三日三夜果有疾風暴雨從太公邑外過晉文公出大蛇當道如拱文公反修德使吏守蛇吏夢天殺蛇曰何故當聖君道覺而視蛇則自死也齊景公伐宋過泰山夢二人怒公謂太公之神晏子謂宋祖湯與伊尹也為言其狀湯晳容多髮伊尹黒而短即所夢也景公進軍不聽軍鼓毁乃散師不果伐徐偃王志云徐君宫人娠而生卵以為不祥弃之水濵獨孤母有犬名鵠蒼獵于水濵得所弃卵銜以東歸獨孤母以為異覆煖之遂沸成兒生時正偃故以為名徐君宫中聞之乃更録取長而仁智襲君徐國後鵠蒼臨死生角而九尾實黄龍也偃王乃葬之徐界中今見云狗壟偃王既主其國仁義著聞欲舟行上國乃通溝陳蔡之間得朱弓矢以巳得天瑞遂因名為弓自稱徐偃王江淮諸侯皆服從偃從者三十六國周王聞之遣使乘驛一日至楚使伐之偃王仁不忍鬭害其民為楚所敗逃走彭城武原縣東山下百姓隨之者以萬數後遂名其山為徐山山上立石室有神靈民人祈禱今皆見存昔夸父與日相逐走渴飲}
  - {type: page-break, offset: 104, content: '', id: KR3l0123_WYG_007-2b, image: WYG1047/WYG1047-0599d.png}
  - {type: page-break, offset: 104, content: '', id: KR3l0123_WYG_007-3a, image: WYG1047/WYG1047-0600a.png}
  - {type: page-break, offset: 104, content: '', id: KR3l0123_WYG_007-3b, image: WYG1047/WYG1047-0600b.png}

  - {type: variant, offset: 837, length: 1, content: 百, WYG: 盧氏曰以雞䁑草搗塗經日即愈周日用曰萬物皆有所相感愚聞以霹􅆮木擊鳥影其鳥應時落地雖未嘗試以是𩔖推必有之蝮蛇秋月毒盛無所蜇螫嚙草木以泄其氣草木即死人樵採設為草木所傷刺者亦殺人毒甚于蝮齧謂之蛇迹也華山有蛇名肥遺六}

  - {type: variant, offset: 12, length: 1, content: 隨, WYG: 北胡人有獻一物大如狗然聲能驚人雞犬聞之皆走名曰猛獸帝見之怪其細小及出苑中欲使虎狼食之虎見此獸即低頭著地帝為反觀見虎如此謂欲下頭作勢起搏殺之而此獸見虎甚喜䑛唇摇尾徑徃虎頭上立因搦虎面虎乃閉目低頭匍匐不敢動搦鼻下去下去之後虎尾下頭起此獸顧之虎輒閉目後魏武帝伐冒頓經白狼山逢師子使人格之殺傷甚衆王乃自率嘗從軍數百擊之師子哮吼奮起左右咸驚王忽見一物從林中出如狸起上帝車軛師子將至此獸便跳起上師子頭上師子即伏不敢起于是遂殺之得師子一還來至洛陽三千里雞犬皆無鳴吠九真有神牛乃生谿上黒山時共鬭即海沸黄或出鬭岸上家牛皆怖人或遮則霹􅆮號曰神牛昔日南貢四𧰼各有雌雄其一雄死于九眞及至南海百有餘日其雌塗土著身不飲食莝草長史問其}
  - {type: page-break, offset: 12, content: '', id: KR3l0123_WYG_003-1b, image: WYG1047/WYG1047-0584d.png}
  - {type: page-break, offset: 12, content: '', id: KR3l0123_WYG_003-2a, image: WYG1047/WYG1047-0585a.png}
  - {type: variant, offset: 12, length: 1, content: 隨, krp: 北胡人有獻一物大如狗然聲能驚人雞犬聞之皆走名曰猛獸帝見之怪其細小及出苑中欲使虎狼食之虎見此獸即低頭著地帝為反觀見虎如此謂欲下頭作勢起搏殺之而此獸見虎甚喜䑛唇摇尾徑徃虎頭上立因搦虎面虎乃閉目低頭匍匐不敢動搦鼻下去下去之後虎尾下頭起此獸顧之虎輒閉目後魏武帝伐冒頓經白狼山逢師子使人格之殺傷甚衆王乃自率嘗從軍數百擊之師子哮吼奮起左右咸驚王忽見一物從林中出如狸起上帝車軛師子將至此獸便跳起上師子頭上師子即伏不敢起于是遂殺之得師子一還來至洛陽三千里雞犬皆無鳴吠九真有神牛乃生谿上黒山時共鬭即海沸黄或出鬭岸上家牛皆怖人或遮則霹靂號曰神牛昔日南貢四𧰼各有雌雄其一雄死于九眞及至南海百有餘日其雌塗土著身不飲食莝草長史問其}
  - {type: variant, offset: 14, length: 1, content: 畫, WYG: 以聞之輒流涕矣越巂國有牛稍割取肉牛不死經日肉生如故大宛國有汗血馬天馬種漢魏西域時有獻者文馬赤鬛身色似若黄金即古之乗黄今謂之露犬也能飛食虎豹蜀山南高山上有物如獼猴長七尺能人行健走名曰猴玃一名化或曰猳玃同行道婦女有好者輒盜之以去人不得知行者或每過其旁皆以長繩相引乃得免此得男子氣自死故取女也取去為室家其年少者終身不得還十年之後形皆𩔖之意亦迷惑不復思歸有子者輒俱送還其家産子皆如人有不食養者其母輒死故無敢不養也及長與人不異皆以楊為姓故今蜀中西界多謂楊率皆猳玃化之子孫大約皆有玃爪者也小山有獸其形如鼓一足如蠡澤有委蛇狀如轂長如轅見之者霸猩猩若黄狗人面能言異鳥崇丘山有鳥一足一翼一目相得}
  - {type: page-break, offset: 14, content: '', id: KR3l0123_WYG_003-2b, image: WYG1047/WYG1047-0585b.png}

  - {type: variant, offset: 1317, length: 742, content: 百歲人凡如此之徒武帝皆集之於魏不使遊散甘始老而少容曹子建密問其所行始言本師姓韓字世雅嘗與師於南海作金投數萬斤於海又取鯉魚一雙令其一著藥俱投沸膏中有藥者奮尾鼓鰓遊行沈浮有若處淵其無藥者已熟而可食言此藥去此踰萬里己不可行不能得也齊桓公出因與管仲故道自燉煌西涉流沙往外國流沙千餘里中無水時時有伏流處人莫能知皆乘駱駝駱駝知水脈過其處輒停不肯行以足蹋地人於其蹋處掘之輒得水諸遠方山郡幽辟處出蜜蠟人往往以桶聚蜂每年一取人有山行墮深澗者無出路飢餓分死左右見龜蛇甚多朝暮引頸向東方人因伏地學之遂不飢體殊輕便能登巖岸經數年後竦身舉臂遂超出澗上即得還家顏色悅懌頗更黠惠勝故還食穀啖滋味百餘日中復本質天門郡有幽山峻谷谷在上人有從下經過者忽然踊出林表狀如飛仙遂絕迹年中如此甚數遂名此處為仙谷有樂道好事者入此谷中洗沐以求飛仙往往得去有長意思人疑必妖怪乃以大石自墜牽一犬入谷中犬復飛去其人還告鄉里募數十人執杖擖山草伐木至山頂觀之遙見一物長數十丈其高隱人耳如簸箕格射刺殺之所吞人骨積在左右有成封蟒開口廣尺餘前後失人皆此蟒氣所噏上於是此地遂安隱無患漢末關中大亂有發前漢時冢者宮人猶活既出平復如舊魏郭后愛念之錄著宮內常置左右問漢時宮中事說之了了皆有次序后崩哭泣過禮遂死焉漢末發范明友奴冢奴猶活明友霍光女壻說光家事廢立之際多與漢書相應此奴常遊走於民間無止住處今不知所在或云尚在余聞之於人可信而目不可見也景初中蒼梧吏到京云廣州西南接交州數郡桂林晉興寧浦間人有病將死便有飛蟲大如小麥或云有甲嘗伺病者居舍上候人氣絕來食亡者雖復撲殺有斗斛而來者如風雨前後相尋續不可斷截肌肉都盡唯餘骨在便去盡貧家無相纏者或殯殮不時皆受此弊有物力者則以衣服布帛五六重裹亡者此蟲惡梓木氣即以板鄣防左右并以作器此蟲便不敢近也入交界更無轉近郡亦有但微少耳, WYG: ''}

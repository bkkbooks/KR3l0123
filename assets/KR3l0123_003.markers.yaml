  - {type: variant, offset: 268, length: 515, content: 五月五日埋蜻蜓頭於西向戶下埋至三日不食則化成青珠又云埋於正中門莊子曰地三年種蜀黍其後七年多蛇鬭戰死亡之處其人馬血積年化為燐燐著地及草木如露略不可見行人或有觸者著人體便有光拂拭便分散無數愈甚有細咤聲如炒豆唯靜住良久乃滅後其人忽忽如失魂經日乃差今人梳頭脫著衣時有隨梳解結有光者亦有咤聲白鷁雄雌相視則孕或曰雄鳴上風雌鳴下風則亦孕兔舐毫望月而孕口中吐子舊有此說余目所見也馬食穀則足重不能行鴈食粟則翼重不能飛山居之民多癭腫疾由於飲泉之不流者今荊南諸山郡東多此疾瘇由踐土之無鹵者今江外諸山縣偏多此病也人啖豆三年則身重行止難啖榆則眠不欲覺啖麥令人多力健行飲真茶令人少眠人常食小豆令人肥肌麤燥食鷰麥令人骨節斷解山雞有美毛自愛其色終日映水目眩則溺死鸐雉長尾雨雪惜其尾栖高樹杪不敢下食往往餓死時魏景初中天下所說鸛水鳥也伏卵時數入水卵冷則不沸取礜石周圍繞卵以助暖氣故方術家以鸛巢中礜石為真物燒馬蹄羊角成灰春夏散著濕地生羅勒大腰無雄龜鼉類也無雄與蛇通氣則孕細腰無雌蜂類也取桑蠶或阜螽子咒而成子詩云螟蛉之子蜾蠃負之是也煎麻油水氣盡無煙不復沸則還冷可內手攪之得水則焰起散卒不滅此亦試之有驗燒白石作白灰既訖積著地經日都冷遇雨及水澆即更燃煙焰起蠐螬以背行快於用足, WYG: ''}

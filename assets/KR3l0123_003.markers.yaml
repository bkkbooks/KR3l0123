  - {type: variant, offset: 1168, length: 148, content: 沈便棄之然千百多浮既長皆拔去上齒牙各一以為身飾神仙傳曰說上據辰尾為宿歲星降為東方朔傅說死後有此宿東方生無歲星漢淮南王謀反被誅亦云得道輕舉鉤弋夫人被殺於雲陽而言尸解柩空桓譚新論說方士有董仲君有罪繫獄佯死臭爛目陷蟲出既而復生魏時方士甘陵甘始廬江有左慈陽城有郄儉始能行氣導引慈曉房中之術儉善辟穀不食悉號, WYG: 飲土漿即愈博物志卷}

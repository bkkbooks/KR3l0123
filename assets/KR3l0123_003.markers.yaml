  - {type: variant, offset: 840, length: 0, content: '', WYG: 頭頭至觸其中則兩頭俱至孫武以喻善用兵者異魚南海有鰐魚狀似鼉斬其頭而乾之去齒而更生如此者三乃止東海中有牛體魚其形狀如牛剥其皮懸之潮水至則毛起潮水去則毛伏東海蛟錯魚生子子驚還入母腸尋復出呉王江行食鱠有餘弃于中流化為魚今魚中有}

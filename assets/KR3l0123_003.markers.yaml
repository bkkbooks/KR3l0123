  - {type: variant, offset: 16, length: 4, content: 闕麒麟鬭, WYG: 飛名曰䖟見則吉良乘之壽千嵗比翼鳥一青一赤在參嵎山有鳥如烏文首白喙赤足曰精衞故精衞常取西山之木石以填東海越地深山有鳥如鳩青色名曰冶鳥穿大樹作巢如升器其户口徑數寸周飾以土堊赤白相次狀如射侯伐木見此樹即避之去或夜㝠人不見鳥鳥亦知人不見巳也鳴曰咄咄上去明日便宜急上樹去咄咄下去明日便宜急下樹去若使去但言笑}

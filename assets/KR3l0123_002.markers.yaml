  - {type: variant, offset: 413, length: 1, content: 海, WYG: 斗斛而來者如風雨前後相尋續不可斷截肌肉都盡唯餘骨在便去盡貧家無相纒者或殯殮不時皆受此弊有物力者則以衣服布帛五六重裹亡者此蟲惡梓木氣即以板鄣防左右并以作器此蟲便不敢近也入交界便無鄰近郡亦有但微少耳異産漢武帝時弱水西國有人乘毛車以渡弱水來獻香者帝謂是常香非中國之所乏不禮其使留久之帝幸上林苑西使至乘輿間并奏其香帝取之看大如鸞卵三枚與棗相似帝不悦以付外庫後長安中大疫宫中皆疫病帝不舉樂西使乞見請燒所貢香一枚以辟疫氣帝不得已聽之宫中病者即日並差長安中百里咸聞香氣芳積九十餘日香猶不歇帝乃厚禮發遣餞送一説漢制獻香不滿斤西使臨去乃發香物如大豆者拭著宫門香氣聞長安數十里經數月乃歇漢武帝時}

  - {type: punctuation, offset: 3, content: 》, id: KR3l0123_CHANT_002-bkkpn2}
  - {type: variant, offset: 4, length: 1, content: 一, WYG: 二晉張華撰外國西海内西北有軒轅國在窮山之際其不壽者八百嵗渚沃之埜鸞自舞民食鳯卵飲甘露白民國有乘黄狀如狐背上有角乘之壽三千嵗君子國人衣冠帶劒使兩虎民衣野絲好禮讓不爭土千里多薫華之草民多疾風氣故人不蕃息好讓故為君子國三苗國昔唐堯以天下讓于虞三苗之民非之帝征之有苗之民叛浮入南海為三苗國驩兠國其民盡似仙人帝堯司徒驩兠之後民常捕海島中人面鳥口去南國萬六千里盡似仙人也大人國其人孕三十六年生白頭其兒則長大能乘雲而不能走蓋龍𩔖去㑹稽四萬六千里厭光國民光出口中形盡似猿猴黒色結胸國有滅䝉鳥竒肱民善為拭扛以殺百禽能為飛車從風逺行湯時西風至吹其車至豫州湯破其車不以視民十年東風至乃復作車遣返而其國去玉門闗四萬里羽民國民有翼飛不逺多鸞鳥民食其卵去九嶷四萬三千里穿胸國昔禹平天下㑹諸侯㑹稽之埜防風氏後到殺之夏德之盛二龍降庭禹使范成光御之行域外既周而還至南海經防風防風之神二臣以塗山之戮見禹便怒而射之迅風雷雨二龍昇去二臣恐以刃自貫其心而死禹哀之乃拔其刃療以不死之草是為穿胸民交趾民在穿胸東孟舒國民人首鳥身其先主為霅氏馴百禽夏后之世始食卵孟舒去之鳯凰隨焉異人}

  - {type: variant, offset: 416, length: 0, content: '', krp: 國有獻膠五兩者帝以付外庫餘膠半兩西使佩以自隨後從武帝射于甘泉宫帝弓弦斷從者欲更張弦西使乃進乞以所送餘膠續}
  - {type: variant, offset: 417, length: 1, content: 濱, WYG: 上左右莫不怪西使乃以口濡膠為水注斷弦兩頭相連注弦遂相著帝乃使力士各引其一頭終不相離西使曰可以射終日不斷帝大怪左右稱竒因名曰續弦膠周書曰西域獻火浣布昆吾氏獻切玉刀火浣布汙則燒之即潔刀切玉如脂布漢世}

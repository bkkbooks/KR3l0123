  - {type: variant, offset: 1150, length: 680, content: 始成故知人生命之長短老子云萬民皆付西王母唯王聖人真人仙人道人之命上屬九天君耳五岳視三公四瀆視諸侯諸侯賞封內名山大川者通靈助化位相亞也故地動臣叛名山崩王道訖川竭神去國隨已亡海投九仞之魚流水涸國之大誡也澤浮舟川水溢臣盛君衰百川沸騰山冢卒崩高岸為谷深谷為陵小人握命君子陵遲白黑不別大亂之徵也江河水赤占曰泣血道路涉蘇於何以處也和氣相感則生朱草山出象車澤出神馬陵出黑丹阜出土怪江出大貝海出明珠仁主壽昌民延壽命天下太平秦前有藍田之鎮後有胡苑之塞左崤函右隴蜀西通流沙險阻之國也蜀漢之土與秦同域南跨卭笮北阻褒斜西即隈礙隔以劍閣窮險極峻獨守之國也周在中樞西阻崤谷東望荊山南面少室北有太嶽三河之分雷風所起四險之國武王克殷定鼎郟鄏以為東都也魏前枕黃河背漳水瞻王屋望梁山有藍田之寶浮池之淵趙東臨九州西瞻恒嶽有沃瀑之流飛壺井陘之險至于潁陽𣵠鹿之野燕卻背沙漠進臨易水西至君都東至於遼長蛇帶塞險陸相乘也齊南有長城巨防陽關之險北有河濟足以為固越海而東通于九夷西界岱嶽配林之峻險固之國也魯前有淮水後有岱嶽蒙羽之向洙泗之流大野廣土曲阜尼丘宋北有泗水南迄淮濄有孟諸之澤碭山之塞也楚後背方城前及衡嶽左則彭蠡右則九疑有江漢之流實險阻之國也南越之國與楚為鄰五嶺已前至于南海負海之邦交趾之土謂之南裔吳左洞庭右彭蠡後濱長江南至豫章水界險阻之國也東越通海處南北尾閭之間三江流入南海通東治山高海深險絕之國也衛南跨于河北得淇水南過濮上左通黎澤右指黎山讚曰地理廣大四海八方遐遠別域略以難詳侯王設險守固保疆遠遮川塞近備城堭司察奸非禁禦不良勿恃危阨恣其淫荒無德則敗有德則昌安屋猶懼乃可不亡進用忠直社稷永康教民以孝舜化以彰, WYG: 志卷二}

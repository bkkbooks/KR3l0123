  - {type: variant, offset: 410, length: 0, content: '', WYG: 南界至蜀諸民曰獠子媍人姙娠七月而産臨水生兒便置水中浮則取養之沈便弃之然千百多浮既長皆拔去上齒牙各一以為身飾母丘儉遣王領追高句麗王宫盡沃沮東界問其耆老言國人常乘船捕魚遭風吹數十日東得一島上有人言語不相曉其俗常以七夕取童女沈海交州夷名曰俚子俚子弓長數尺箭長尺餘以燋銅為鏑塗毒藥于鏑􅄡中人即死不時斂藏即腹脹沸爛須臾肌肉都盡唯骨耳其俗誓不以此藥法語人治之飲婦人月水及糞汁時有差者唯射猪犬則無恙以其食糞故也燋銅者故燒器其長老唯别燋銅聲以物杵之徐聽其聲得燋毒者便鑿取以為箭鏑景初中蒼梧吏到京云廣州西南接交州數郡桂林晉興寧浦間人有病將死便有飛蟲大如小麥或云有甲在舍上人氣絶來食亡者雖}

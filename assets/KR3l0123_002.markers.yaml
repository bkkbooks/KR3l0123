  - {type: variant, offset: 945, length: 204, content: 土泉者引地氣也山有沙者生金有穀者生玉名山生神芝不死之草上芝為車馬中芝為人形下芝為六畜土山多雲鐵山多石五土所宜黃白宜種禾黑墳宜麥黍蒼赤宜菽芋下泉宜稻得其宜則利百倍有山者採有水者漁山氣多男澤氣多女平衍氣仁高凌氣犯叢林氣躄故擇其所居居在高中之平下中之高則產好人居無近絕溪群冢狐蟲之所近此則死氣陰匿之處也石者金之根甲石流精以生水水生木木含火援神契曰五岳之精雄聖四瀆之精仁明河者水之伯上應天漢太山天帝孫也主召人魂東方萬, WYG: 博}

  - {type: variant, offset: 494, length: 352, content: 去人不遠也南海短狄未及西南夷以窮斷今渡南海至交趾者不絕也中國之城左濱海右通流沙方而言之萬五千里面二千五百里東至蓬萊西至隴右后跨京北前及衡岳若計共四隅有三億之餘降朝鮮岷山東治可西也隴川以南及北海之國此是堯舜土萬里及湯時七千里此後亦無常隨德優劣也東方少陽日月所出山谷清朗其人佼好西方少陰日月所入其土窈冥其人高鼻深目多毛南方太陽土下水淺其人大口多傲北方太陰土平廣深其人廣面縮頸中央四戰風雨交山谷峻其人端正堯別九州舜為十二五岳華岱恒衡嵩四瀆河出崑崙墟江出岷山濟出王屋淮出桐柏八流亦出名山渭出鳥鼠漢出嶓冢洛出熊耳潁出少室汝出燕泉泗出陪尾沔出月台沂出太山水有五色有濁有清河淮濁江濟清南陽有清冷之水丹水泉水汝南有黃水華山有黑水泞水淵或生明珠而崖不枯山澤通氣以興雷雲氣觸石膚寸而合不崇朝以雨山有夔其形如鼓一足如蠡澤有委蛇, WYG: 上}

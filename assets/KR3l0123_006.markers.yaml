  - {type: variant, offset: 1259, length: 1, content: 宮, WYG: 宫姜嫄祠在雍城長安西南三十里盜蹠冢在太陽縣西趙鞅冢在臨水縣西始皇陵在驪山之北髙數十丈周迴六七里今在隂盤縣界北陵雖髙大不足以銷六十萬人積年之功其功力或𨼆不見如驪山水泉本北流障使東西流又此土無石於渭北諸山運取大石故歌曰運石甘泉口渭水為不流千人唱萬人鉤今陵餘石大如覆土屋其餘功力皆如此𩔖盧氏曰秦氏奢侈自知葬用珍寳多故髙作陵園山者使難發也髙則難上固則難攻項羽爭衡之時發其陵未詳其至棺否舊洛陽字作水邊各火行也忌水故去水而加佳又魏于行次為土水得土而流土得水而柔故復去佳加水變雒為洛焉洞庭君山帝之二女居之曰湘夫人又荆州圖經曰湘君所遊故曰君山南荆賦江陵有臺甚大而有一柱衆木皆拱之典禮攷三讓一曰禮辭二曰固辭三曰終辭漢承秦羣臣上書皆曰昧死言王莽盜位慕古法昧死曰稽首光武因而不改肉刑明王之制荀卿每論之至漢文帝感太倉公女之言而廢之班固著論宜復迄漢末魏初陳紀又論宜申古制孔融亦云可復欲申之鍾繇王朗不同遂寢夏侯𤣥李勝曹羲丁謐建私議各有彼此多云時未可復故遂寢焉上公備物九錫一大輅各一𤣥牡二駟二衮冕之服赤舄副之三軒懸之樂六佾之舞四朱户以居五納陛以登六虎賁之士三百人七鈇鉞各一八彤弓一彤矢百玈弓十玈矢千九秬鬯一卣珪瓚副之樂攷漢末喪亂無金石之樂魏武帝至漢中得杜䕫舊法始復設軒懸鐘磬至于今用之依䕫也服飾攷漢末喪亂絶無玉佩始復作之今之玉佩受于王粲古者男子皆絲衣有故乃素服又有冠無幘故雖凶事皆著冠也漢中興士人皆冠葛巾建安中魏武帝造白帢於是遂廢唯二學書生猶著也器名攷寳劒名純鉤湛盧豪曹魚腸巨闕五劒皆歐冶子所作龍泉太阿工市三劒皆楚王所問者風胡子因呉請干將歐冶子作干將陽龍文莫邪隂澷理此二劒呉王使干將作莫邪干將妻作也夫妻甚喜作劒也赤刀周之寳器也物名攷古駿馬有飛兔腰􅒁周穆王八駿赤驥飛黄白蟻華騮騄耳騧騟渠黄盜驪唐公有驌驦項羽有騅周日用曰曹公有流影而吕布有赤兔皆後來之良駿也周穆王有犬名􅀈毛白晉靈公有畜犬名獒韓國有黒犬名盧宋有駿犬曰䧿犬四尺為獒張騫使西域還乃得胡桃種徐州人謂塵土為蓬塊呉人謂跋跌博物志卷六}

  - {type: variant, offset: 1176, length: 2, content: 興士, WYG: 復本質天門郡有幽山峻谷而其土人有從下經過者忽然踊出林表狀如飛仙遂絶迹谷中如此甚數遂名此處為仙谷有樂道好事者入此谷中洗沐以求飛仙徃徃得去有長生意思人疑恐是妖怪乃以大石自墜牽一犬入谷中犬復飛去其人還告鄉里募數十人執杖揭山草伐木至山頂觀之遙見一物長數十丈其高隱人耳如簸箕格射刺殺之所吞人骨積此左右已成封其蟒開口廣丈餘前後失}

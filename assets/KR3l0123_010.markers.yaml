  - {type: variant, offset: 286, length: 2, content: 臥草, krp: 割不正不食聽誦詩書諷詠之音不聽淫聲不視邪色以此産子必賢明端正壽考所謂父母胎教之法盧氏曰子之得清純滋液則生仁聖得錯亂之氣則生貪淫子因母氣也故古者婦人姙娠必慎所感感于善則善感于惡則惡矣姙娠者不可啖兔肉又不可見兔令兒唇缺又不可啖生薑令兒多指異説云瞽瞍夫婦凶頑而生舜叔梁紇淫夫也徵在失行也加又野合而生仲尼焉安在有胎教也盧氏曰夫甲及寅年生者聖以年在嵗德在甲寅之年生者則然矣亦由先天也亦由父母氣也古者元氣清故多聖今者俗淫隂濁故無聖人也豫章郡衣冠人有數婦暴面于道尋道爭分銖以給其夫輿馬衣資及舉孝亷更取富者一切皆給先者雖有數年之勤婦子滿堂室猶放黜以避後人諸逺方山郡幽僻處出蜜蠟人徃徃以桶聚蜂每年一取逺方諸山蜜蠟處以木為器}
  - {type: variant, offset: 289, length: 0, content: '', WYG: 開小孔以蜜蠟塗器内外令遍春月蜂將生育時捕取三兩頭著器中蜂飛去尋將伴來經日漸益遂持器歸人藉帶眠者則夢蛇鳥銜人之髮夢飛王尒張衡馬均皆冒重霧行一人無恙一人病一人死}
  - {type: variant, offset: 289, length: 0, content: '', krp: 開小孔以蜜蠟塗器内外令遍春月蜂將生育時捕取三兩頭著器中蜂飛去尋將伴來經日漸益遂持器歸人藉帶眠者則夢蛇鳥銜人之髮夢飛王尒張衡馬均皆冒重霧行一人無恙一人病一人死}
  - {type: variant, offset: 291, length: 362, content: 所以聞之輒流涕矣南方有落頭民其頭能飛其種人常有所祭祀號曰虫落故因取名焉以其頭飛因眼便去以耳為翼將曉還復著體吳時往往得此人也東海中有牛魚其形狀如牛剝其皮懸之潮水至則毛起潮去則毛伏南海有鰐魚狀似鼉斬其頭而乾之去齒而更生如此者三乃止屠黿解其肌肉唯腸連其頭而經日不死猶能齧物鳥往食之則為所得漁者或以張鳥雀遇神蛇能斷而復續無啟民居穴食土無男女死埋之其心不朽百年還化為人鏐民其肺不朽百年復生細民其肝不朽百年而化為人皆穴居處三國同類也南海外有鮫人水居如魚不廢織績其眼能泣珠蜀山南高山上有物如獼猴長七尺能人行健走名曰猴玃一名馬化或曰猳玃伺行道婦女有好者輒盜之以去人不得知行者或每遇其旁皆以長繩相引然故不免此物能別男女氣臭故取女不取男也取去為室家其無子者終身不得還十年之後形皆類之意亦迷惑不復思歸有子者輒俱送還其家產子皆如人有不食養者其母輒死, WYG: ''}

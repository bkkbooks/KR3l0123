  - {type: variant, offset: 697, length: 407, content: 也越地深山有鳥如鳩青色名曰冶鳥穿大樹作巢如升器其戶口徑數寸周飾以土堊赤白相次狀如射侯伐木見此樹即避之去或夜冥人不見鳥鳥亦知人不見己也鳴曰咄咄上去明日便宜急上樹去咄咄下去明日便宜急下若使去但言笑而不已者可止伐也若有穢惡及犯其止者則虎通夕來守人不知者即害人此鳥白日見其形鳥也夜聽其鳴人也時觀樂便作人悲喜形長三尺澗中取石蟹就人火間炙之不可犯也越人謂此鳥為越祝之祖交州夷名曰俚子俚子弓長數尺箭長尺餘以燋銅為鏑塗毒藥於鏑鋒中人即死不時歛藏即胮脹沸爛須臾肌肉都盡唯骨在耳其俗誓不以此藥法語人治之飲婦人月水及糞汁時有差者唯射豬犬者無佗以其食糞故也燋銅者故燒器其長老唯別燋銅聲以物杵之徐聽其聲得燋毒者便鑿取以為箭鏑蝮蛇秋月毒盛無所蜇螫嚙草木以泄其氣草木即死人樵採設為此草木所傷刺者亦殺人毒始於蝮齧謂之蛇迹也江南諸山郡中大樹斷倒者經春夏生菌謂之椹食之有味而忽毒殺人云此物往往自有毒者或云虵所著之楓樹生者啖之令人笑不得止治之飲土漿多愈, WYG: 空腹}

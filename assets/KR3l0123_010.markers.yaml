  - {type: variant, offset: 286, length: 2, content: 臥草, WYG: 割不正不食聽誦詩書諷詠之音不聽淫聲不視邪色以此産子必賢明端正壽考所謂父母胎教之法盧氏曰子之得清純滋液則生仁聖得錯亂之氣則生貪淫子因母氣也故古者婦人姙娠必慎所感感于善則善感于惡則惡矣姙娠者不可啖兔肉又不可見兔令兒唇缺又不可啖生薑令兒多指異説云瞽瞍夫婦凶頑而生舜叔梁紇淫夫也徵在失行也加又野合而生仲尼焉安在有胎教也盧氏曰夫甲及寅年生者聖以年在嵗德在甲寅之年生者則然矣亦由先天也亦由父母氣也古者元氣清故多聖今者俗淫隂濁故無聖人也豫章郡衣冠人有數婦暴面于道尋道爭分銖以給其夫輿馬衣資及舉孝亷更取富者一切皆給先者雖有數年之勤婦子滿堂室猶放黜以避後人諸逺方山郡幽僻處出蜜蠟人徃徃以桶聚蜂每年一取逺方諸山蜜蠟處以木為器}

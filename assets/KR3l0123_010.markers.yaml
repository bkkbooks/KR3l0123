  - {type: variant, offset: 27, length: 0, content: '', krp: 日算之遇竒則為男遇偶則為女知為女胎即可依法婦}
  - {type: variant, offset: 28, length: 253, content: 以竹木投以取火諸葛丞相往視之後火轉盛執盆蓋井上煮水多得塩入以家火即滅訖今不復燃也酒泉延壽縣南山名火泉火出如炬徐公曰西域使王暢說石流黃出且彌山去高昌八百里有石流黃高數十丈從廣五六十畝有取石流黃孔穴晝視其孔上狀如青煙常高數尺夜視皆如燃燈光明高尺餘暢所視見也且彌人言時氣不和皆往保此山毒氣自減魏文帝黃初三年武都西部都尉王褒獻石膽三十斤四年獻三斤九真有神牛乃生谿上黑夜出時時其鬭即海沸黃昏或出鬭岸上家牛皆怖人或遮捕則霹靂號曰神牛日南有野女群行覓丈夫其狀皛且自裸袒無衣襦昔日南貢四象各有雌雄其一雄死百有餘日其雌塗土著, WYG: 姙}

  - {type: variant, offset: 1164, length: 0, content: '', WYG: 昔劉𤣥石于中山酒家沽酒酒家與千日酒忘言其節度歸至家當醉而家人不知以為死也權葬之酒家計千日滿乃憶𤣥石前來酤酒醉當醒耳徃視之云𤣥石亡來三年已葬于是開棺醉始醒俗云𤣥石飲酒一醉千日舊説云天河與海通近世有人居海濵者年年八月有浮槎去來不失期人有竒志立飛閣于槎上多齎糧乘槎而去十餘日中猶觀星月日辰自後芒芒忽忽亦不覺晝夜去十餘日奄至一處有城郭狀屋舍甚嚴遙望宫中多織婦見一丈夫牽牛渚次飲之牽牛人乃驚問曰何由至此此人具説來意并問此是何處答曰君還至蜀郡訪嚴君}
  - {type: page-break, offset: 1164, content: '', id: KR3l0123_WYG_010-3b, image: WYG1047/WYG1047-0608d.png}
  - {type: variant, offset: 1164, length: 0, content: '', krp: 昔劉𤣥石于中山酒家沽酒酒家與千日酒忘言其節度歸至家當醉而家人不知以為死也權葬之酒家計千日滿乃憶𤣥石前來酤酒醉當醒耳徃視之云𤣥石亡來三年已葬于是開棺醉始醒俗云𤣥石飲酒一醉千日舊説云天河與海通近世有人居海濵者年年八月有浮槎去來不失期人有竒志立飛閣于槎上多齎糧乘槎而去十餘日中猶觀星月日辰自後芒芒忽忽亦不覺晝夜去十餘日奄至一處有城郭狀屋舍甚嚴遙望宫中多織婦見一丈夫牽牛渚次飲之牽牛人乃驚問曰何由至此此人具説來意并問此是何處答曰君還至蜀郡訪嚴君}
  - {type: variant, offset: 1165, length: 10, content: 原管輅善卜筮解鳥語漢, WYG: 則知之竟不上岸因還如期後至蜀問君平曰某年月日有客星犯牽牛宿計年月正是此人到天河時也人有山行墮深澗者無出路飢餓欲死左右見龜蛇甚多朝暮引頸向東方人因伏地學之遂不飢體殊輕便能登巖岸經數年後竦身舉臂遂超出澗上即得還家顔色悦懌頗更黠慧勝故還食穀啖滋味百餘日}

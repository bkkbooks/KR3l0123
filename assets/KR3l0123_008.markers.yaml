  - {type: variant, offset: 1112, length: 268, content: 然魏王所集方士名上黨王真隴西封君達甘陵甘始魯女生譙國華佗字元化東郭延年唐霅冷壽光河南卜式張貂薊子訓汝南費長房鮮奴辜魏國軍吏河南麴聖卿陽城郄儉字孟節廬江左慈字元放右十六人魏文帝東阿王仲長統所說皆能斷穀不食分形隱沒出入不由門戶左慈能變形幻人視聽厭刻鬼魅皆此類也周禮所謂怪民王制稱挾左道者也又典論云議郎李覃學郄儉辟穀服茯苓飲水不寒中泄痢殆至殞命軍祭酒弘農董芬學甘始鴟視狼顧呼吸吐納為之過差氣閉不通良久乃蘇寺人嚴峻就左慈學補導之術閹豎真無事於斯術而逐聲若此魏文帝所記諸物相似亂者武夫怪石似美玉蛇床亂蘼無薺苨亂人參杜衡亂細辛雌黃似石留黃鯿魚相亂以, WYG: 其}

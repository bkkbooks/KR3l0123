  - {type: variant, offset: 70, length: 0, content: '', krp: 庭産棘乃小子發取周庭梓樹樹之于闕間梓化為松栢棫柞覺驚以告文王文王曰慎勿言冬日之陽夏日之隂不召而萬物自來天道尚左日月西移地道尚右水潦東流天不享于殷自發之生于今十年夷羊在牧水潦東流天下飛蝗滿埜命之在周其信然乎武王伐殷舍于畿逢大雨焉革輿}

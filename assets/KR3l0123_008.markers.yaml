  - {type: variant, offset: 78, length: 1, content: 四, WYG: 嘉禄欽順仲夏之吉日遵並大道郊域康阜萬國之休靈始加元服推逺童稚之幼志𢎞積文武之寵德肅勤高祖之清廟六合之内靡不䝉德嵗嵗與天無極右孝昭周成王冠辭止雨祝}

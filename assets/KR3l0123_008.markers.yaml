  - {type: variant, offset: 769, length: 2, content: 罹罪, WYG: 待之七月七日夜漏七刻王母乘紫雲車而至于殿西南面東向頭上太華髻青氣鬱鬱如雲有三青鳥如烏大立侍母旁時設九微燈帝東面西向王母索七桃大如彈丸以五枚與帝母食二枚帝食桃輒以核著膝前母曰取此核將何為帝曰此桃甘美欲種之母笑曰此桃三千年一生實唯帝與母對坐其從者皆不得進時東方朔竊從殿南廂朱鳥牖中窺母母顧之謂帝曰此窺牖小兒甞三來盜吾此桃帝乃大怪之由此世人謂方朔神仙}

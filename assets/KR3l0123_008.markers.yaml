  - {type: variant, offset: 78, length: 1, content: 四, krp: 嘉禄欽順仲夏之吉日遵並大道郊域康阜萬國之休靈始加元服推逺童稚之幼志𢎞積文武之寵德肅勤高祖之清廟六合之内靡不䝉德嵗嵗與天無極右孝昭周成王冠辭止雨祝}
  - {type: variant, offset: 81, length: 1, content: 雄, WYG: 生五穀以養人民今天雨不止用傷五穀如何如何靈而不幸殺牲以賽神靈雨則不止鳴鼓攻之朱緑繩縈而脅之請雨曰皇皇上天照臨下土集地之靈神降甘雨庶物羣生咸得其所禮記曰孔子少孤不知其父墓母亡問于鄒曼父之母乃合葬于防防墓又崩門人後至孔子問來何遲門人實對孔子不應如是者三乃潸然流涕而止曰古不修墓蔣濟何晏夏侯𤣥王肅皆云無此事注記者謬時賢咸從之周日用曰四士言無者後人何故而述之在愚所見實未之誤矣且徵在與梁紇埜合而生事多隱之况孔子生而父已死既隱何以知之非問曼父之母安得合葬于防也孔子東遊見二小兒辯鬭問其故一小兒曰我以日始出時去人近而日中時逺也一小兒曰我以日出時逺而日中時近一小兒曰日初出時大如車蓋及日中時如盤盂此不為逺者小而近者大乎一小兒曰日初出滄滄涼涼及其中如探湯此不為近者熱而逺者涼乎孔子不能决兩小兒笑曰孰謂汝多知乎亦出列子周日用曰日當中向熱者炎氣直下也譬猶火氣直上而兩旁者其炎凉可悉耳足明初出近而當中逺矣豈聖人不能決乎子路與子貢過鄭神社社樹有鳥神牽率子路子貢説之乃止春秋哀公十有四年春西狩獲麟公羊傳曰有以告者孔子曰孰為來哉孰為來哉盧氏曰以其時非應故孔子泣而感之麟口吐三䇿蓋天使報聖人左傳曰叔孫氏之車子鉏商獲麟以為不祥燕太子丹質于秦秦王遇之無禮不得意思欲歸請于秦王王不聽謬言曰令}
  - {type: page-break, offset: 81, content: '', id: KR3l0123_WYG_008-3a, image: WYG1047/WYG1047-0603a.png}
  - {type: page-break, offset: 81, content: '', id: KR3l0123_WYG_008-3b, image: WYG1047/WYG1047-0603b.png}

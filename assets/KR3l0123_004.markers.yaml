  - {type: variant, offset: 292, length: 238, content: 從者皆不得進時東方朔竊從殿南廂朱鳥牗中窺母母顧之謂帝曰此窺牖小兒嘗三來盜吾此桃帝乃大怪之由此世人謂方朔神仙也漢武帝時弱水西國有人乘毛車以渡弱水來獻香者帝謂是常香非中國之所乏不禮其使留久之帝幸上林苑西使干乘輿聞并奏其香帝取之看大如鷰卵三枚與棗相似帝不悅以付外庫後長安中大疫宮中皆疫病帝不舉樂西使乞見請燒所貢香一枚以辟疫氣帝不得已聽之宮中病者登日並差長安中百里咸聞香氣芳積九十餘日香猶不歇帝乃厚禮發遣餞送一說漢制獻香不滿斤不得受西使臨去乃發香氣如大豆者拭著宮門香氣聞長安四面數十里, WYG: 頭而}

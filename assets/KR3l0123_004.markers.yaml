  - {type: variant, offset: 1483, length: 1, content: 常, WYG: 也物𩔖燒鉛錫成胡粉猶𩔖也燒丹朱成水銀則不𩔖物同𩔖異用者石魏文帝所記諸物相似亂眞者碔砆怪石似美玉蛇牀亂蘼蕪薺苨亂人參杜衡亂細辛雄黄似石流黄鯿魚相亂以有大小相異敵木亂門冬百部似門冬房葵似狼毒鉤吻草與荇華相似拔揳與萆薢相似一名狗脊藥物烏頭天雄附子一物春秋冬夏採各異也逺志苗曰小草根曰逺志芎藭苗曰江蘺根曰芎藭菊有二種苗花如一唯味小異苦者不中食埜葛食之殺人家葛種之三年不收後旅生亦不可食神仙傳云松栢脂入地千年化為茯苓茯苓化為琥珀琥珀一名江珠今泰}

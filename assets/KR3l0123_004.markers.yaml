  - {type: variant, offset: 907, length: 159, content: 年年八月有浮槎去來不失期人有奇志立飛閣於查上多齎糧乘槎而去十餘日中猶觀星月日辰自後芒芒忽忽亦不覺晝夜去十餘日奄至一處有城郭狀屋舍甚嚴遙望宮中多織婦貉見一丈夫牽牛渚次飲之牽牛人乃驚問曰何由至此此人見說來意并問此是何處答曰君還至蜀郡訪嚴君平則知之竟不上岸因還如期後至蜀問君平曰某年月日有客星犯牽牛宿計年月正是此人到天河時也, WYG: 或以取鳥遇神虵復續蠐螬以背行快于用足}

  - {type: variant, offset: 1486, length: 4, content: 蛇名率然, WYG: 練形六芝之延年也中藥養性合歡蠲忿萱草忘憂下藥治病謂大黄除實當歸止痛夫命之所以延性之所以利病之所以止當其藥應以病也違其藥失其應即怨天尤人説鬼神矣神農經曰藥物}

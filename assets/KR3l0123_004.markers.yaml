  - {type: variant, offset: 720, length: 152, content: 反觀見虎如此欲謂下頭作勢起搏殺之而此獸見虎甚喜舐唇搖尾徑往虎頭上立因溺虎口虎乃閉目低頭匍匐不敢動溺畢下去下去之後虎尾下頭起此獸顧之虎輒閉目後魏武帝伐蹋頓經白狼山逢師子使人格之殺傷甚眾王乃自率常從軍數百擊之師子哮吼奮起左右咸驚王忽見一物從林中出如狸超上王車軛上師子將至此獸便跳上師子頭上即伏不敢起於是遂殺之, WYG: 所}

  - {type: variant, offset: 1485, length: 0, content: '', WYG: 出茯苓而無琥珀益州永昌出琥珀而無茯苓或云燒蜂巢所作未詳此二説地黄藍首斷心分根復種皆生女蘿寄生兔絲兔絲寄生木上生根不着地槿花朝生夕死藥論神農經曰上藥養命謂五石}

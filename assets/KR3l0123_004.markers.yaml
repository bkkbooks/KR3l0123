  - {type: variant, offset: 1198, length: 149, content: 為珍味不覺其腥臊也食陸畜者狸兔鼠雀以為珍味不覺其膻燋也毋丘儉遣王頎追高句麗王宮盡沃沮東界問其耆老海東復有人不耆老言國人常乘船捕魚遭風吹數十日東得一島上有人言語不相曉其俗常以七夕取童女沈海又言有一國亦在海中純女無男又說得一布衣從海中浮出其身如中國人衣兩袖長二丈又得一破船隨波出在海岸邊有一人項中復有面, WYG: 醢漬之則文章}

  - {type: variant, offset: 1521, length: 4, content: 凝血從廣, WYG: 雌雞生中山三曰隂命赤色着木懸其子出海中四曰内童狀如鵞亦生海中五曰鴆羽如雀黒頭赤喙六曰􅶎䖷生海中雄曰䖷雌曰􅶎也神農經曰藥種有五毒一曰狼毒占斯解之二曰巴豆霍汁解之三曰黎盧湯解之四曰天雄烏頭大豆解之五曰班貓戎鹽解之毒菜害小兒乳汁解多食飲二升食忌人啖豆三年則身重行止難啖榆則眠不欲覺啖麥稼令人有力健行飲眞茶令人少眠人常食小豆令人肌肥麤燥食鷰麥令人骨節斷解人食鷰肉不可入水為蛟龍所吞人食冬葵為狗所齧瘡不差或致死馬食穀則足重不能行鴈食粟則翼重不能飛藥術胡粉白石灰等以水和之塗髩鬚不白塗訖着油單裹令温煗候欲燥未燥間洗之湯則不得着晩晩則多折用煖湯洗訖澤塗之欲染當熱洗髩鬚有膩不着藥臨染時亦當拭鬚燥温之陳葵子微火炒令爆咤散著熟地遍蹋之朝種暮生逺不過經宿耳陳葵子秋種覆蓋令經冬不死春有子也周日用曰愚聞熟地植生菜蘭將石流黄篩于其上以盆覆之即時可待又以變白牡丹為五色皆須沃其根以紫草汁則變紫紅花汁則變紅並未試于理可為此出爾雅注燒馬蹄羊角成灰春夏散着濕地生羅勒蠏漆相合成為神仙藥服食方云戲術削氷令圓舉以向日以艾于後承其影則得火取火法如用珠取火多有説者此未試神農本草云雞卵可作琥珀其法取伏卵毈黄白渾雜者煮及尚軟隨意刻作物件以苦酒漬}

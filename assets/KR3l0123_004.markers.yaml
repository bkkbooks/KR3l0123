  - {type: variant, offset: 33, length: 144, content: 秦國人長一丈臨洮人長三丈五尺禹致群臣於會稽防風氏後至戮而殺之其骨專車長狄喬如身橫九畝長五丈四尺或長十丈秦始皇二十六年有大人十二見于臨洮長五丈足迹六尺東海之外大荒之中有大人國僬僥氏長三尺詩含神霧曰東北極人長九寸漢武帝好仙道祭祀名山大澤以求神仙時西王母遣使乘白鹿告帝當來乃供帳九華殿以待之七月, WYG: ''}

  - {type: variant, offset: 109, length: 0, content: '', krp: 地理畧自魏氏日已前夏禹治四方而制之河圖括地𧰼曰地南北三億三萬五千五百里地部之位起形高大者有崑崙山廣萬里高萬一千里神物之所生聖人仙人之所集也出五色雲氣五色流水其泉南流入中國名曰河也其山中應于天最居中八十城布繞之中國東南隅居其一分是偏域也中國之域左濵海右通流沙方而言之萬五千里東至蓬萊西至隴右後跨京北前及衡岳堯舜時萬里三代時七千里亦無常隨德優劣也堯别九州舜為十二秦前有藍田之鎮後有胡苑之塞左崤函右隴蜀西通流沙險阻之國也蜀漢之土與秦同域南跨卭笮北阻襃斜西即隈礙隔以劒閣窮險極峻獨守之國也周在中區西阻崤谷東望荆山南面少室北背太嶽三河之分雷風所起四險之國也魏前枕黄河背漳水瞻王屋望梁山有藍田之寳浮池之淵也趙東臨九州西瞻恒嶽有沃瀑之流飛狐井陘之險至于潁陽涿鹿之野燕却背沙漠進臨易水西至軍都東至於遼長蛇帶塞險陸相乘也齊南有長城巨防陽闗之險北有河濟足以為固越海而東通于九夷西界岱嶽配林之坂險固之國也魯前有淮水後有岱嶽䝉羽之向洙泗之流大埜廣土曲阜尼丘宋北有泗水南迄睢濄有孟瀦之澤碭山之塞也楚後背方城前及衡嶽左則彭蠡右則九疑有江漢之流實險阻之國也南越之國與楚為鄰五嶺已前至于南海負海之邦交趾之土謂之南裔呉左洞庭右彭蠡後濵長江南至豫章水戒險阻之國也東越通海處南北尾閭之間三江流入南海通東甌山高海深險絶之國也衞南跨于河北得洪水南過漢上左通魯澤右指黎山讚曰地理廣大四海八方遐逺别域畧以難詳侯王設險守國保疆逺遮川塞近備城隍司察姦非禁禦不良勿恃危阨恣其淫荒無德則敗有德則昌安屋猶懼乃可不亡進用忠良社稷永康教民以孝舜化以彰地天地初不足故女媧氏煉五色石以補其闕斷鼇足以立四極其後共工氏與顓頊爭帝而怒觸不周之山折天柱絶地維故天後傾西北日月星辰就焉地不滿東南故百川水注焉崑崙山北地轉下三千六百里有八𤣥幽都方二十萬里地下有四柱四柱廣十萬里地有三千六百軸犬牙相舉泰山一曰天孫言爲天帝孫也主召人魂魄東方萬物始成知人生命之長短考靈曜曰地有四遊冬至地上北而西三萬里夏至地下南而東三萬里春秋二分其中矣地常動不止譬如人在舟而坐舟行而人不覺七戎六蠻九夷八狄經總而言之謂之四海言皆近海海之言晦昬無所覩也地以名山為輔佐石為之骨川為之脈草木為之毛土為之肉三尺以上為糞三尺以下為地山五嶽華岱恒衡嵩按北太行山而北去不知山所限極處亦如東海不知所窮盡也石者金之根甲石流精以生水水生木木含火水漠北廣逺中國人尠有至北海者漢使驃騎將軍霍去病北伐單于至瀚海而還有北海明矣周日用曰余聞北海言蘇武牧羊之所去部落甚邇秪一池號北海蘇武牧羊當在于是耳北地見有蘇武湖非北溟之海漢使張騫渡西海至大秦西海之濵有小崑崙高萬仞方八百里東海廣漫未聞有渡者南海短狄未及西南夷以窮攜家渡南海至交趾者不絶也史記封禪書云威宣燕昭違人乘舟入海有蓬萊方丈瀛州三神山神人所集欲採仙藥蓋言先有至之者其鳥獸皆白金銀為宫闕悉在渤海中去人不逺四瀆河出崑崙墟江出岷山濟出王屋淮出桐栢八流亦出名山渭出鳥鼠漢出嶓冢洛出熊耳涇出少室汝出燕泉泗出陪尾沔出月台汶出泰山水有五色有濁有清汝南有黄水華山有黒水泞水淵或生明珠而岸不枯山澤通氣以興雷雲氣觸石膚寸而合不崇朝以雨江河水赤名曰泣血道路驚駭山河為墟也山水總論五嶽視三公四瀆視諸侯諸侯賞封内名山者通靈助化位相亞也故地動臣叛名山崩王道訖川竭神去國隨以亡海投九仞之魚流水涸國之大誡也澤浮舟川水溢臣盛君衰百川沸騰山冢崒崩高岸為谷深谷為陵小人握命君子陵遲白黒不别大亂之徵也援神契曰五嶽之神聖四瀆之精仁河者水之伯上應天漢太山天帝孫也主召人魂魄東方萬物始成故知人生命之長短五方人民東方少陽日月所出山谷清其人佼好西方少隂日月所入其土窈㝠其人高鼻深目多毛南方太陽土下水淺其人大口多傲北方太隂土平廣深其人廣面縮頸中央四析風雨交山谷峻其人端正南越巢居北朔穴居避寒暑也東南之人食水産西北之人食陸畜食水産者龜蚌螺蛤以為珍味不覺其腥也食陸畜者狸兔鼠雀以為珍味不覺其膻也有山者採有水者漁山氣多男澤氣多女平衍氣仁高陵氣犯叢林氣躄故擇其所居居在高中之平下中之高則産好人居無近絶溪羣冢狐蟲之所近此則死氣隂匿之處也山居之民多癭腫疾癭由於飲泉之不流者今荆南諸山郡東多此疾腫由於踐土之無鹵者今江外諸山縣偏多此病也盧氏曰不然也在山南人有之北人及呉楚無此病蓋南出黒水水土然也今處不流泉之界者固無此病也物産地性含水土山泉者引地氣也山有沙者生金有穀者生玉名山生神芝不死之草上芝為車馬中芝為人形下芝為六畜土山多雲鐵山多石五土所宜黄白宜種禾黒墳宜麥黍蒼赤宜菽芋下泉宜稻得其宜則利百倍和氣相感則生朱草山出𧰼車澤出神馬陵出黒丹阜出土怪江出大貝海出明珠人主壽昌民延壽命天下太平名山大川孔穴相納和氣所出則生石脂玉膏食之不死神龍靈龜行於穴中矣神宫在高石沼中有神人多麒麟靈芝神草有英泉飲之眠三百嵗乃覺不死去瑯琊四萬五千里三株樹生赤水之上員丘山上有不死樹食之乃壽有赤泉飲之不老多大蛇為人害不得居也博物志卷一}

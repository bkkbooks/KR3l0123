  - {type: variant, offset: 12, length: 13, content: 比干文王四友南宮括散宜生閎, WYG: 家語曰食水者乃耐寒而善浮食土者無心而不息食木者多力而不治食石者肥澤而不老食草者善走而愚食桑者有緒而蛾食肉者勇毅而悍食氣者神明而壽食穀者智慧而}

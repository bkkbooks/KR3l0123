  - {type: variant, offset: 58, length: 0, content: '', krp: 蒲萄酒積年不敗彼俗云可十年飲之醉彌月乃解所食逾少心逾開所食逾多心逾塞年逾損焉辨方士漢淮南王謀反被誅亦云得道輕舉周日用曰漢書云淮南自刑應不然乎得道輕舉非虚事也至今維揚境内馬迹猶存且日與八公同處皆上品眞人耳既談道德肯圖叛逆之事况恒行隂德好書藝不善弋獵淮南内書言神仙黄白之術去反事逺矣夫古今書傳多黜仙道者慮帝王公侯廢萬幾而慕其道故隱而不書唯老耼不可掩而云三百嵗後西遊流沙不知所之庾書云蜀有女道士謝自然白日上昇此外歴代史籍未嘗言也鉤弋夫人被殺于雲陽而言尸解柩空周日用曰史云夫人死大風拔樹揚沙揭石亦不云尸解柩空文帝典論云議郎李覃學郄儉辟穀服茯苓飲水中寒泄痢殆至殞命軍祭酒𢎞農董芬學甘始鴟視狼顧呼吸吐納為之過差氣閉不通良久乃蘇寺人嚴峻就左慈學補導之術閹竪眞無事于斯而逐聲若此又云王仲統云甘始左元放東郭延年行容成御婦人法並為丞相所録間行其術亦得其驗降就道士劉景受雲母九子元方年三百嵗莫知所在武帝恒御此藥亦云有驗劉德治淮南王獄得枕中鴻寳秘書及子向緘而竒之信黄白之術可成謂神仙之道可致卒亦無驗乃}

  - {type: variant, offset: 122, length: 244, content: 禮記曰孔子少孤不知其父墓母亡問於鄒曼父之母乃合葬於防防墓又崩門人後至孔子問來何遲門人實對孔子不應如是者三乃潸然流涕而止曰古不脩墓蔣濟何晏夏侯玄王肅皆云無此事注記者謬時賢咸從之肉刑明王之制荀卿每論之漢興文帝感太倉公女之言而廢之班固著論宜復迄漢末魏初陳紀又論宜申古制孔融云不可復魏武帝輔漢欲申之鍾繇王朗不同遂寑夏侯玄李勝曹羲丁謐建私議各有彼此多云時未可復故遂寢焉漢興多瑞應至武帝之世特甚麟鳳數見王莽時郡國多稱瑞應歲歲相尋皆由順時之欲承旨求媚多無實應乃使人猜疑三讓一曰禮讓二曰固讓三曰終讓上公備, WYG: 博}

body:
  text: 博物志卷三河圖玉板云龍伯國人長三十丈生萬八千歲而死大秦國人長十丈中秦國人長一丈臨洮人長三丈五尺禹致群臣於會稽防風氏後至戮而殺之其骨專車長狄喬如身橫九畝長五丈四尺或長十丈秦始皇二十六年有大人十二見于臨洮長五丈足迹六尺東海之外大荒之中有大人國僬僥氏長三尺詩含神霧曰東北極人長九寸漢武帝好仙道祭祀名山大澤以求神仙時西王母遣使乘白鹿告帝當來乃供帳九華殿以待之七月七日夜漏七刻王母乘紫雲車而至於殿西南面東向頭上戴七勝青氣鬱鬱如雲有三青鳥如烏大俠侍母旁時設九微燈帝東面西向王母索七桃大如彈丸以五枚與帝母食二枚帝食桃輒以核著膝前母曰取此核將何為帝曰此桃甘美欲種之母笑曰此桃三千年一生實唯帝與母對坐其從者皆不得進時東方朔竊從殿南廂朱鳥牗中窺母母顧之謂帝曰此窺牖小兒嘗三來盜吾此桃帝乃大怪之由此世人謂方朔神仙也漢武帝時弱水西國有人乘毛車以渡弱水來獻香者帝謂是常香非中國之所乏不禮其使留久之帝幸上林苑西使干乘輿聞并奏其香帝取之看大如燕卵三枚與棗相似帝不悅以付外庫後長安中大疫宮中皆疫病帝不舉樂西使乞見請燒所貢香一枚以辟疫氣帝不得已聽之宮中病者登日並差長安中百里咸聞香氣芳積九十餘日香猶不歇帝乃厚禮發遣餞送一說漢制獻香不滿斤不得受西使臨去乃發香氣如大豆者拭著宮門香氣聞長安四面數十里經數月乃歇漢武帝時西海國有獻膠五兩者帝以付外庫餘膠半兩西使佩以自隨後從武帝射於甘泉宮帝弓弦斷從者欲更張弦西使乃進乞以所送餘香膠續之座中左右莫不怪西使乃以口濡膠為水注斷絃兩頭相連注弦遂相著帝乃使力人各引其一頭終不相離西使曰可以射終日不斷帝大怪左右稱奇因名曰續弦膠漢武帝時大苑之北胡人有獻一物大如狗然聲能驚人雞犬聞之皆走名曰猛獸帝見之怪其細小及出苑中欲使虎狼食之虎見此獸即低頭著地帝為反觀見虎如此欲謂下頭作勢起搏殺之而此獸見虎甚喜舐唇搖尾徑往虎頭上立因溺虎口虎乃閉目低頭匍匐不敢動溺畢下去下去之後虎尾下頭起此獸顧之虎輒閉目後魏武帝伐踏頓經白狼山逢師子使人格之殺傷甚衆王乃自率常從軍數百擊之師子哮吼奮起左右咸驚王忽見一物從林中出如狸超上王車軛上師子將至此獸便跳上師子頭上即伏不敢起於是遂殺之得師子一還來至洛陽三千里雞犬皆伏無鳴吠舊說云天河與海通近世有人居海渚者年年八月有浮槎去來不失期人有奇志立飛閣於查上多齎糧乘槎而去十餘日中猶觀星月日辰自後芒芒忽忽亦不覺晝夜去十餘日奄至一處有城郭狀屋舍甚嚴遙望宮中多織婦貉見一丈夫牽牛渚次飲之牽牛人乃驚問曰何由至此此人見說來意并問此是何處答曰君還至蜀郡訪嚴君平則知之竟不上岸因還如期後至蜀問君平曰某年月日有客星犯牽牛宿計年月正是此人到天河時也周官云貉不渡汶水鸜鵒不渡濟水魯國無鸜鵒來巢記異也橘渡淮北化為枳今之江東甚有枳橘太古書今見存者有神農經山海經山海經或云禹所作素問黃帝作連山歸藏夏殷之書周時曰易蔡雍云禮記月令周公作諡法司馬法周公所作南越巢居北朔穴居避寒暑也東南之人食水産西北之人食陸畜食水産者龜蛤螺蚌以為珍味不覺其腥臊也食陸畜者狸兔鼠雀以為珍味不覺其膻燋也毋丘儉遣王頎追高句麗王宮盡沃沮東界問其耆老海東復有人不耆老言國人常乘船捕魚遭風吹數十日東得一島上有人言語不相曉其俗常以七夕取童女沈海又言有一國亦在海中純女無男又說得一布衣從海中浮出其身如中國人衣兩袖長二丈又得一破船隨波出在海岸邊有一人項中復有面生得之與語不相通不食而死其地皆在沃沮東大海中大宛國有汗血馬天馬種漢魏西域時有獻者越巂國有牛稍割取肉牛不死經日肉生如故周書曰西戎獻火浣布昆吾氏獻切玉刀火浣布汙則燒之即潔刀切玉如蠟布漢世有獻者刀則未聞東海鮫䱜魚生子子驚還入母腹尋復出積油滿萬石則自然生火武帝泰始中武庫災積油所致常山之蛇名率然有兩頭觸其一頭頭至觸其中則兩頭俱至孫武以喻善用兵者東海有物狀如凝血從廣數尺方圓名曰鮓魚無頭目腹內無腸藏其所處衆蝦附之隨其東西越人煮食之取鱉挫令如碁子大搗赤莧汁和合厚以茅苞五六月中投於池澤中經旬日臠臠盡成鱉也吳王江行食膾有餘棄於中流化為魚今魚中有名吳王膾餘者長數寸大者如筯猶有膾形廣陵陳登食膾作病華他下之膾頭皆成蟲尾猶是膾春秋書鼷鼠食郊牛牛死鼠之類最小者食物當時不覺痛世傳云亦食人項肥厚皮處亦不覺或名甘鼠俗人諱此所嚙衰病之徵

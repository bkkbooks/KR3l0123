front:
  text: 博物志序地理略自魏氏目已前夏禹治四方而制之余視山海經及禹貢爾雅說文地志雖曰悉備各有所不載者作略說出所不見粗言遠方陳山川位象吉凶有徵諸國境界犬牙相入春秋之後並相侵伐其土地不可具詳其山川地澤略而言之正國十二博物之士覽而鑒焉

body:
  text: 博物志卷六黃帝治天下百年而死民畏其神百年以其教百年故曰黃帝治三百年中古男三十而妻女二十而嫁曾子曰弟子不學古知之矣貧者不勝其憂富者不勝其樂曾子曰好我者知吾美矣惡我者知吾惡矣龜三千歲巢於蓮葉遊于卷耳之上武王伐殷舍於戚逢大雨焉乘輿三百卒甲三千一日一夜行三百里以戰于牧野蓍一千歲而三百莖同本以老故知吉凶蓍末大於本為上吉必沐浴齋潔燒香每朔望浴蓍必五浴之浴龜亦然明夷曰昔夏后筮乘飛龍而登于天而枚占皋陶曰吉昔夏啓筮徙九鼎啓果徙之昔舜筮登天為神校占有黃龍神曰不吉武王伐殷而枚占蓍老蓍老曰吉桀筮伐唐而枚占熒惑曰不吉昔鯀筮注洪水而枚占大明曰不吉有初無後有鳥如烏文首白喙赤足曰精衛昔赤帝之女名媱往遊于東海溺死而不返其神化為精衛故精衛常取西山之木石以填東海古䍃山帝女化為䍃草其葉鬱茂其華黃實如豆服者媚於人胡粉白石灰等以水和之塗鬢鬚不白塗訖著油單裹令溫暖候欲燥未燥間洗之早則不得著晚則多折用暖湯洗訖澤塗之欲染當熱洗髮鬚有膩不著藥臨染時亦當拭鬚燥溫之柔利國人一手一足反卷曲張騫使西域還乃得胡桃種江陵有貙人能化為虎俗又曰虎化為人好著紫葛衣足無踵泰山一曰天孫言為天帝孫也主召人魂魄東方萬物始成故主人生命之長短洞庭君山帝之二女居之曰湘夫人又荊州圖語曰湘君所遊故曰君山也有道與吳包山潛通上有美酒數斗得飲者不死漢武帝齋七日遣男女數十人至君山得酒欲飲之東方朔曰臣識此酒請視之因一飲致盡帝欲殺之朔乃曰殺朔若死此為不驗以其有驗殺亦不死乃赦之庭州灞水以金銀鐵器盛之皆漏唯瓠葉則不漏太原晉陽以北生屏風草扶海洲上有草焉名蒒其實食之如大麥七月稔熟民斂穫至冬乃訖名曰自然穀或曰禹餘糧

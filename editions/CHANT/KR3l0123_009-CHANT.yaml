body:
  text: 博物誌卷八黃帝登仙其臣左徹者削木象黃帝帥諸侯以朝之七年不還左徹乃立顓頊左徹亦仙去也子路與子貢過鄭神社社樹有鳥子路捕鳥社神牽攣子路子貢說之乃止處士東里塊責禹亂天下事禹退作三匈之城強者攻弱者守敵者戰城郭蓋禹始也澹臺子羽子溺水死弟子欲收而葬之滅明曰此命也與螻蟻何親與魚鼈何讎遂不使葬元始元年中謁者沛郡史岑上書訟王宏奪董賢璽綬之功靈帝光和元年遼西太守黃翻上言海邊有流屍露冠絳衣體皃完全感翻夢云我伯夷之弟孤竹君之子也海水壞吾棺槨求見掩藏吏民有嗤視者皆無疾而亡豫章郡衣冠之人有數婦暴面市廛爭分銖以給其夫輿馬衣資及舉孝廉更取富者一切皆給先者雖有數年之勤婦子滿堂室猶放黜以避後人盧植云代城始築立板幹一旦亡西南四五十里板於澤中自立結葦為門因就營築焉其城圓匝而不方周三十七里為九門故城處呼曰東城漢滕公薨求葬東都門外公卿送喪駟馬不行踣地悲鳴以足跑地掘馬蹄下地得石槨有銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室遂葬焉衛靈公葬得石槨銘曰不馮其子靈公奪我里漢西都時南宮寢殿內有醇儒王史威長死葬銘曰明明哲士知存知亡崇隴原舋非寧非康不封不樹作靈乘光厥銘何伊王史威長列傳云聶政刺韓相白虹為之貫日要離刺慶忌彗星襲月專諸刺吳王僚鷹擊殿上子胥伐楚燔其府庫破其九龍之鍾武王伐紂至盟津渡河大風波武王操鉞秉旄麾之風波立霽魯陽公與韓戰酣而日暮援戈麾之日反三舍太公為灌壇令風不鳴條文王夢婦人當道夜哭問之曰吾是泰山神女嫁於東海神童今灌壇令當道廢我行我行必有大風雨而太公有德吾不敢以暴風雨過是毀君德文王明日召太公三日果有疾風暴雨從太公邑外過晉文公出大蛇當道如拱文公反修德使吏守蛇吏夢天使殺蛇曰何故當聖君道覺而視蛇則自死也齊景公伐宋過泰山夢二人怒公謂太山之神晏子謂宋祖湯與伊尹也為言其狀湯晳容多鬚伊尹黑而短即所夢也景公進軍不聽軍鼓毀公恐散軍不果伐宋澹臺子羽渡河齎千金之璧河伯欲之至陽侯波起兩鮫挾船子羽左操璧右操劍擊鮫皆死既渡三投璧于河河伯三躍而歸之子羽毀璧而去荊軻字次非渡江兩鮫夾船次非下劍盡斷其頭而風波靜東海上有勇士菑丘訢過神淵強使飲馬馬沈訢去朝服拔劍而入三日三夜殺二蛟一龍而出雷神隨而擊之七日七夜眇其左目楚子熊渠夜行射寢石以為伏虎矢為沒羽徐州地理志云徐君宮人娠而生卵以為不祥棄之水濱獨孤母有犬名鵠蒼獵於水濱得所棄卵𠾑以來歸獨孤母以為異覆煖之遂烰成兒生時正偃故以為名徐君宮中聞之乃更錄取長而仁智襲君徐國後鵠倉臨死生角而九尾實黃龍也偃王葬之徐界中今見有狗壟偃王既襲其國仁義著聞欲舟行上國乃通溝陳蔡之間得朱弓朱矢以已得天瑞遂因名為號自稱徐偃王江淮諸侯皆伏從伏從者三十六國周王聞之遣使乘駟一日至楚使伐之偃王仁不忍鬭害其民為楚所敗北走彭城武原縣東山下百姓隨之者以萬數後遂名其山為徐山山上立石室廟有神靈民人祈禱今皆見存京兆都張潛客居遼東還後為駙馬都尉關內侯表言故為諸生太學時聞故太尉常山張顥為梁相天新雨後有鳥如山䧿飛翔近地市人擲之稍下墮地民爭取之即為一圓石言縣府顥令搥破之得一金印文曰忠孝侯印顥表上之藏於官庫後議郎汝南樊行夷校書東觀表上言堯舜之時舊有此官今天降印宜可復置孝武建元四年天雨粟孝元竟寧元年南陽山都雨穀小者如黍粟而青黑味苦大者如大豆赤黃味如麥下三日生根葉狀如大豆初生時也大司馬曹休所統中郎謝璋部曲義兵奚儂息女年四歲病歿故埋葬五日復生太和三年詔令休使父母持送女來視之其年四月三日病死四日埋藏至八日同墟人採桑聞兒啼聲即語儂妻往發視兒生活今能飲食如常結胸國有滅蒙鳥奇肱國其民善為機巧以殺百禽能為飛車從風遠行湯時西風至吹其車至豫州湯破其車不以視民十年東風至乃復作車遣返其國去玉門關四萬里比翼鳥一青一赤在參嵎山羽民國民有翼飛不遠多鸞鳥民食其卵去九疑四萬三千里驩兜國其民畫似仙人帝堯司徒驩兜民常捕魚海島中人面鳥喙去南國萬六千里畫似仙人也厭火國民火出口中畫似猿猴黑色三苗國昔唐堯以天下讓於虞舜三苗之君非之帝殺之有苗之民叛浮入南海為三苗國穿胸國昔禹平天下會諸侯於會稽之野防風氏後到殺之夏德盛二龍降庭禹使范成光御之以行域外既周而還至南海經房風房風氏之二臣以塗山之戮見禹便怒而射之迅雷風雨二龍昇去二臣恐以刃自貫其心而死禹哀之乃拔其刃療以不死之草是為穿胸民交趾民其為人交足在穿胸東孟舒國民人首鳥身其先主為虡氏訓百禽夏后之世始食卵孟舒去之鳳皇隨焉止些山多竹長千仞鳳食其實去九疑萬八千里員丘山上有不死樹食之乃壽有赤泉飲之不老多大蛇為人害不得居也蒙雙民昔高陽氏有同產而為夫婦帝放之此野相抱而死神鳥以不死草覆之七年男女皆活同頸二頭四手是蒙雙民大人國其人孕三十六年而生兒白頭長又能乘雲而不能走蓋龍類去會稽四萬六千里風山之首方高三百里風穴如電突深三十里春風自此而出也君子國人衣冠帶劍使兩文虎民衣野絲好禮讓不爭土方千里多蕣華之草民多疾風氣故人不蕃息好讓故為君子國堇花朝生夕死箕子居朝鮮其後燕伐之朝鮮亡入海為鮮國雨師妻黑色珥兩青蛇操兩蛇蓋勾芒也神宮在高石沼中有神人多麒麟其芝神草有英泉飲之服三百歲乃覺不死去琅邪四萬五千里嘔絲之野女子方跪據樹嘔絲在三桑西也

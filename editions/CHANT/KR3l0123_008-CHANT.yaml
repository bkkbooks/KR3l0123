body:
  text: 博物誌卷七神農經曰藥物有大毒不可入口鼻耳目者入即殺人一曰鉤吻二曰鴟三曰除命四曰內童五曰鴆神農經曰藥物有五毒一曰狼毒木占斯解之二曰巴豆藿汁解之三曰黎蘆葱湯解之四曰天雄烏頭大豆汁解之五曰班茅戎鹽解之毒菜小兒溺乳汁解之食飲二升黃帝問天老曰天地所生豈有食之令人不死者乎天老曰太陽之草名曰黃精餌而食之可以長生太陰之草名曰鉤吻不可食入口立死人信鉤吻之殺人不信黃精之益壽不亦惑乎神農經曰上藥養命謂五石之練形六芝之延年也中藥養性謂合歡蠲忿萱草忘憂也下藥治病謂大黃除實當歸止痛夫命之所以延性之所以和病之所以愈是當其藥應以病也違其藥失其應即怨天尤人設鬼神矣孔子家語曰食水者乃耐寒而善游食土者無心而不息食木者多力而不治食石者肥澤而不老食草者善走而愚食桑者有絲而蛾食肉者勇而悍食氣者神明而壽食穀者智慧而夭不食者不死而神仙傳曰雜食者百病妖邪之所鍾焉所食逾少心逾開年逾益所食逾多心逾塞年逾損焉魏武帝好養性法亦解方藥招引四方術之士廬江左慈譙郡華他甘陵甘始陽城郄儉无不畢至文帝典論曰陳思王曹植辯道論云世有方士吾王悉招至之甘陵有甘始盧江有左慈陽城有郄儉始能行氣導引慈曉房中之術儉善辟穀悉號三百歲人自王與太子及余之兄弟咸以為調笑不全信之然嘗試郄儉穀百日躬與寢處行步起居自若也夫人不食七日則死而儉乃能如是左慈修房中之術差可以終命然自非有志至精莫能行也甘始老而少容自諸術士咸共歸之王使郄孟節主領諸人又一說皇甫隆遇青牛道士姓封名君達其論養性法即可放用大略云體欲常勞食欲常少勞勿過極少勿過虛食去肥濃節酸鹹減思慮捐喜怒除馳逐慎房室春夏施瀉秋冬閉藏詳別篇武帝行之有效又云王仲統云甘始左元放東郭延年行容成御婦人法並為丞相所錄間行其術亦得其驗降龍道士劉景受雲母九子丸方年三百歲莫知所在武帝恒御此藥亦云有驗劉德治淮南王獄得枕中鴻寶苑秘書及其子向咸共奇之信黃白之術可成謂神仙之道可致卒亦無驗乃以罹罪也劉根不覺饑渴或謂能忍盈虛王仲都當盛夏之月十爐火炙之不熱當嚴冬之時裸之而不寒桓君山以為性耐寒暑君山以為無仙道好奇者為之前者已述焉近魏明帝時河東有焦生者裸而不衣處火不燋入水不凍杜恕為太守親所呼見皆有實事潁川陳元方韓元長時之通才者所以並信有仙者其父時所傳聞河南密縣有上成公其人出行不知所至復來還語其家云我得仙因與家人辭訣而去其步漸高良久乃沒而不見至今密縣傳其仙去二君以信有仙蓋由此也左元放度荒年法擇大豆麤細調勻食之必生者熟挼之令有光使煗氣徹豆心內先不食一日以冷水頓服三升服訖其魚肉菜果酒醬鹹酢甘苦之物不得復經口渴即飲水慎不可煖飲初小困十數日後體力壯健不復思食大鮫法服三升為劑亦當隨人先食多少增損之歲豐欲還食者煮葵子及脂蘇肥肉羹漸漸飲之須豆下乃可食豆未下盡而食實物腸塞則殺人矣此未試或可以然魏王所集方士名上黨王真隴西封君達甘陵甘始魯女生譙國華佗字元化東郭延年唐霅冷壽光河南卜式張貂薊子訓汝南費長房鮮奴辜魏國軍吏河南麴聖卿陽城郄儉字孟節廬江左慈字元放右十六人魏文帝東阿王仲長統所說皆能斷穀不食分形隱沒出入不由門戶左慈能變形幻人視聽厭刻鬼魅皆此類也周禮所謂怪民王制稱挾左道者也又典論云議郎李覃學郄儉辟穀服茯苓飲水不寒中泄痢殆至殞命軍祭酒弘農董芬學甘始鴟視狼顧呼吸吐納為之過差氣閉不通良久乃蘇寺人嚴峻就左慈學補導之術閹豎真無事於斯術而逐聲若此魏文帝所記諸物相似亂者武夫怪石似美玉蛇床亂蘼無薺苨亂人參杜衡亂細辛雌黃似石留黃鯿魚相亂以有大小相異敵休亂門冬百部似門冬房葵似狼毒鉤吻草與堇葉相似拔揳與萆薢相似一名狗脊菊有二種苗花如一唯味小異苦者不中食野葛食之殺人家葛種之三年不收後旅生亦不可食神仙傳云松脂入地千年化為茯苓茯苓千年化為琥珀琥珀一名紅珠今泰山出茯苓而無琥珀益州永昌出琥珀而無茯苓或云燒蜂巢所作未詳此二說孰是神農本草云雞卵可作琥珀其法取伏苓雞卵段黃白渾雜者煮及尚軟隨意刻作物以苦酒漬數宿既堅內著粉中佳者乃亂真矣此世所恒用作無不成者積艾草三年後燒津液下流成鈆錫已試有驗燒鈆錫成胡粉猶類也燒丹朱成水銀則不類物有同類而異用者烏頭天雄附子一物春秋冬夏採各異也遠志苗曰小草根曰遠志芎藭苗曰江蘺根曰芎藭地黃根節多者寸斷之蒔種皆生女蘿寄生兔絲兔絲寄生松上生根不著地

body:
  text: 博物誌卷十蓍末大於本為上吉次蒿次荊皆如是夏桀之時為長夜宮於深谷之中男女雜處十旬不出聽政天乃大風揚沙一夕填此宮谷又為石室瑤臺關龍逢諫桀言曰吾之有民如天之有日日亡我則亡以為龍逢妖言而殺之其後復於山谷下作宮在上耆老相與諫桀又以為妖言而殺之夏桀之時費昌之河上見二日在東者爛爛將起在西者沉沉將滅若疾雷之聲昌問於馮夷曰何者為殷何者為夏馮夷曰西夏東殷於是費昌徙族歸殷昔彼高陽是生伯鯀布土取帝之息壤以填洪水昔西夏仁而去兵城郭不修武士無位唐伐之西夏亡昔者玄都賢鬼神道廢人事天其謀臣不用龜策是從忠臣無祿神巫用國玄都以亡猩猩若黃狗人面能言犬戎文馬赤鬣身白目若黃金名古黃之乘復葪之露犬也能飛食虎豹榆州氏之君孤而無使曲集進伐之以亡昔有巢氏有亂臣而貴任之以國假之以權專國主斷已而奪之臣怒而生變有巢以亡昔者清陽強力四征重丘遺之美女不治國而亡昔有洛氏宮室無常囿池廣大人民困匱商伐之有洛以亡大姒夢見商之庭產棘乃小子發取周庭梓樹樹之于闕間梓化為松柏棫柞覺驚以告文王文王曰慎勿言冬日之陽夏日之陰不召而萬物自來天道尚左日月西移地道尚右水潦東流天不享於殷自發之未生於今六十年夷羊在牧飛鴻滿野日之出地無移照乎洞庭之山帝之二女舜之二妃居之曰湘夫人舜崩二女啼以涕揮竹竹盡斑華山有蛇名肥遺六足四翼見則天下大旱崇吾之山有鳥焉一足一翼一目相得而飛名曰鶼鶼見則天下大水吉良乘之壽千歲夷海內西北有軒轅國在窮山之際其不壽者八百歲諸沃之野鸞鳥自歌鳳烏自舞民食鳳卵飲甘露白民國有乘黃狀如狐背上有角乘之壽三千歲博父西夸父與日相逐走渴飲水河渭不足北飲大澤未至渴而死棄其策杖化為鄧林嘔絲之野有女子方跪據樹嘔絲北海外也三珠樹生赤水之上遠方諸山出蜜臈處其處人家有養蜂者其法以木為器或十斛五斛中開小孔令纔容蜂出入以蜜臘塗器內外令遍安著簷前或庭下春月蜂將生育時捕取三兩頭著器中數宿蜂飛去尋將伴來經日漸益遂停器中魏武伐蹋頓經白狼山逢師子使格之殺傷甚眾見一物從竹中出如貍上帝車軛上師子將至便跳上師子頭師子伏不敢起遂殺之得師子還未至四十里雞犬皆無鳴吠東海有牛魚其形如牛剝其皮懸之潮水至則毛起潮退則毛伏王尒張衡馬均昔俱冒重霧行一人無恙一人病一人死問其故無恙人曰我飲酒病者食粥死者空腹赤刀周之寶器也

body:
  text: 博物志卷七晉張華撰異聞昔夏禹觀河見長人魚身出曰吾河精豈河伯耶馮夷華隂潼鄉人也得仙道化為河伯豈道同哉仙夷乘龍虎水神乘魚龍其行恍惚萬里如室夏桀之時為長夜宫于深谷之中男女雜處十旬不出聽政天乃大風揚沙一夕填此宫谷又為石室瑶臺闗龍逄諫桀言曰吾之有民如天之有日日亡我則亡以龍逄為妖言而殺之其後復于山谷下作宫在上耆老相與諫桀又以為妖言而殺之夏桀之時費昌之河上見二日在東者爛爛將起在西者沈沈將滅若疾雷之聲昌問于馮夷曰何者為殷何者為夏馮夷曰西夏東殷于是費昌徙族歸殷武王伐紂至盟津渡河大風波武王操戈秉麾麾之風波立霽魯陽公與韓戰酣而日暮援戈麾之日返三舍太公為灌壇令武王夢婦人當道夜哭問之曰吾是東海神女嫁于西海神童今灌壇令當道廢我行我行必有大風雨而太公有德吾不敢以暴風雨過以毁君德武王明日召太公三日三夜果有疾風暴雨從太公邑外過晉文公出大蛇當道如拱文公反修德使吏守蛇吏夢天殺蛇曰何故當聖君道覺而視蛇則自死也齊景公伐宋過泰山夢二人怒公謂太公之神晏子謂宋祖湯與伊尹也為言其狀湯晳容多髮伊尹黒而短即所夢也景公進軍不聽軍鼓毁乃散師不果伐徐偃王志云徐君宫人娠而生卵以為不祥弃之水濵獨孤母有犬名鵠蒼獵于水濵得所弃卵銜以東歸獨孤母以為異覆煖之遂沸成兒生時正偃故以為名徐君宫中聞之乃更録取長而仁智襲君徐國後鵠蒼臨死生角而九尾實黄龍也偃王乃葬之徐界中今見云狗壟偃王既主其國仁義著聞欲舟行上國乃通溝陳蔡之間得朱弓矢以巳得天瑞遂因名為弓自稱徐偃王江淮諸侯皆服從偃從者三十六國周王聞之遣使乘驛一日至楚使伐之偃王仁不忍鬭害其民為楚所敗逃走彭城武原縣東山下百姓隨之者以萬數後遂名其山為徐山山上立石室有神靈民人祈禱今皆見存昔夸父與日相逐走渴飲於河謂不足北飲大澤未至渴而死棄其策杖化為鄧林澹臺子羽渡河齎千金之璧河伯欲之至中流陽侯波起兩蛟挾船子羽左操璧右操劒擊蛟皆死既渡三投璧于河伯河伯躍而歸之子羽毁而去荆軻字次非渡河蛟夾船次非不走斷其頭而風波靜除周日用曰余甞行經荆將軍墓墓與羊角哀冢鄰昔安伯施云為秦將軍所遷乃在此也其地在苑陵之源曽見其墓碑將軍名軻次非字也東阿王勇士有蕃丘訢過神淵使飲馬馬沈訢朝服拔劒入水二日一夜殺二蛟一龍而出雷隨擊之七日夜眇其左目漢滕公薨出葬東都門外公卿送喪駟馬不行跼地悲鳴跑蹄下地得石室有銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室遂葬焉衞靈公葬得石槨銘曰不逢箕子靈公奪我里漢西都時南宫寢殿内有醇儒王史威長死葬銘曰明明哲士知存知亡崇隴髙原非寧非康不封不樹作靈乘光厥銘何依王史威長元始元年中謁者沛郡史岑上書訟王宏奪董賢璽綬之功靈帝和光元年遼西太守黄翻上言海邊有流屍露冠綘衣體貌完全後翻感夢云我伯夷之弟孤竹君也海水壊吾棺槨求見掩藏民有襁褓視者無疾而卒漢末闗中大亂有發前漢時冢者宫人猶活既出平復如舊魏郭后愛念之録著宫内常置左右問漢時宫中事説之了了皆有次序后崩哭泣過禮遂死焉見述異説漢末發范明友冢奴猶活明友霍光女聓説光家事廢立之際多與漢書相似此奴常遊走於民間無止住處今不知所在或云尚在余聞之于人可信而目不可見也大司馬曹休所統中郎謝璋部曲義兵奚儂息女年四嵗病疫故埋葬五日復生太和三年詔令休使父母同時送女來視其年四月三日復病死四日埋葬至八日向墟邑採桑聞兒生活今能飲食如常京兆都張潛客居遼東還後為駙馬都尉闗内侯表言故為諸生太學時聞故太尉常山張顥為梁相天新雨後有鳥如山䧿飛翔近地市人擲之稍下墮民爭取之即為一員石言縣府顥令搥破之得一金印文曰忠孝侯印顥表上之藏于官庫後議郎汝南樊行夷校書東觀表上言堯舜之時舊有此官今天降印宜可復置孝武建元四年天雨粟孝元竟寧元年南陽郡中雨穀小者如黍粟而青黒味苦大者如大豆赤黄味如麥下三日生根葉狀如大豆初生時也代城始築立板榦一旦亡西南四五十板于澤中自立結草為外門因就營築焉故其城直周三十七里為九門故城處為東城博物志卷七

  text: 欽定四庫全書子部十二
  hash: sha256:b91c7627c34399fce720371900e7def4c0469982b792a8bd4a0a78b88d470d59
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0123_WYG_000-1a, image: WYG1047/WYG1047-0573a.png}
body:
  text: 博物志小説家𩔖三瑣記之屬提要臣等謹案博物志十卷舊本題晉張華撰考王嘉拾遺記稱華好觀秘異圖緯之部捃採天下遺逸自書契之始考驗神怪及世間閭里所説造博物志四百卷奏於武帝帝詔詰問卿才綜萬代博識無倫然記事采言亦多浮妄可更芟截浮疑分為十卷云云是其書作於武帝時今第四卷物性𩔖中稱武帝泰始中武庫火則武帝以後語矣周亮工書影謂藝文𩔖聚引博物志子貢説社𣗳一條今本不載案此條實在第八卷中亮工葢偶然未檢然考裴松之三國志注魏志太祖紀文帝紀濊𫝊呉志孫賁傳引博物志四條今本惟有太祖紀所引一條而佚其前半餘三條皆無之又江淹古銅劍贊引張華博物志曰鑄銅之工不可復得惟蜀地羗中時有解者今本無此語足證非齊梁時所見之本又唐㑹要載顯慶三年太常丞吕才奏按張華博物志曰白雪是泰帝使素女鼓五絃曲名以其調高人遂和寡又張彦遠厯代名畫記引張華博物志曰劉褒漢桓帝時人曽畫雲漢圖人見之覺熱又畫北風圖人見之覺涼今本皆無此語李善注文選引張華博物志十二條見今本者九條其西京賦注引王孫公子皆古人相推敬之詞一條閒居賦注引張騫使大夏得石榴李廣利為貳師將軍伐大宛得蒲陶一條七命注引橙似橘而非若柚而有芬香一條今本皆無此語段公路北户錄引博物志五條見今本者三條其鵂鶹一名鷄鵂一條金魚腦中有麩金出功婆塞一條則今本皆無此語足證亦非唐人所見之本太平廣記引博物志鄭宏沈釀川一條趙彦衞雲麓漫鈔引博物志黄藍張騫得自西域一條今本皆無之晁公武讀書志稱卷首有理略後有讚文今本卷首第一條為地理略自魏氏日以前云云無所謂理略讚文惟地理有之亦不在卷後又趙與旹賓退錄稱張華博物志卷末載湘夫人事亦誤以為堯女今本此條乃在八卷之首不在卷末皆相矛盾則併非宋人所見之本或原書㪚佚好事者掇取諸書所引博物志而雜採他小説以足之故證以藝文𩔖聚太平御覽所引亦往往相符其餘為他書所未引者則大抵剽剟大戴禮春秋繁露孔子家語本草經山海經拾遺記搜神記異苑西京雜記漢武内傳列子諸書餖飣成帙不盡華之原文也又劉昭續漢志注律厯志引博物記一條輿服志引博物記一條五行志引博物記二條郡國志引博物記二十九條齊東野語引其中日南野女一條謂博物記當是秦漢間古書張華取其名而為志楊慎丹鉛錄亦稱據後漢書注博物記乃唐蒙所作今觀裴松之三國志注引博物志四條又於魏志涼茂傳中引博物記一條灼然二書更無疑義此本惟載江河水赤一條又載漢末闗中女子及范明友奴發冡重生一條而分為兩條又載日南野女一條訛羣行不見夫句為羣行見丈夫訛其狀皛且白句為狀晶目其餘三十一條則悉遺漏豈非偶於他書見此三條以博物二字相同不辨為兩書而貿貿採入乎至於雜記下所載豫章衣冠人有數婦一條乃隋書地理志之文唐人所撰華何自見之尤雜合成編之明證矣書中間有成句或稱盧氏或稱周日用案文獻通考載周盧注博物志六卷此所載寥寥數條殆非完本或亦後人偶為摘附歟乾隆四十六年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀

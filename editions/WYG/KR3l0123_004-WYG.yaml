  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0123_WYG_004-1a, image: WYG1047/WYG1047-0587c.png}
body:
  text: 博物志卷四晉張華撰物性九竅者胎化八竅者卵生龜鼈皆此𩔖咸卵生影伏白鷁雄雌相視則孕或曰雄鳴上風則雌孕兔䑛毫望月而孕口中吐子舊有此説余目所未見也大腰無雄龜鼉𩔖也無雄與蛇通氣則孕細腰無雌蜂𩔖也無雌則負别蟲於空木中七日而化盖取桑􅁞即阜螽子呪而成子詩云螟蛉有子蜾蠃負之是也􅁞三化先孕而後交不交者亦産子子後為􅁞皆無眉目易傷收採亦薄鳥雌雄不可别翼右掩左雄左掩右雌二足而翼謂之禽四足而毛謂之獸鵲巢門户背太嵗向太乙智也鸐雉長毛雨雪惜其尾栖高樹杪不敢下食徃徃餓死聞魏景初中時人所説鸛水鳥也伏卵時則不鳴卵冷取礜石用繞卵以時助燥氣山鷄有美毛自愛其色終日映水目眩則溺死龜三千嵗遊於蓮葉巢於卷耳之上屠龜解其肌肉唯腸連其頭而經日不死猶能齧物鳥徃食之則為所得漁者或以取鳥遇神虵復續蠐螬以背行快于用足周官云貉不渡汶水鸜鵒不渡濟水魯國無鸜鵒來巢記異也橘渡江北化為枳今之江東甚有枳橘百足一名馬蚿中斷成兩段各行而去物理凡月暈隨灰畫之隨所畫而闕淮南子云未詳其法麒麟鬭而日蝕鯨魚死而彗星出嬰兒號而母乳出􅁞咡絲而商弦絶莊子云地三年種蜀黍其後七年多蛇積艾草三年後燒津液下流成鈆錫已試有驗煎麻油水氣盡無烟不復沸則還冷可以手攪之得水則焰起散卒不滅此亦試之有驗庭州灞水以金銀鐵器盛之皆漏唯瓠葉則不漏龍肉以醢漬之則文章生積油滿萬石則自然生火武帝泰始中武庫火積油所致也物𩔖燒鉛錫成胡粉猶𩔖也燒丹朱成水銀則不𩔖物同𩔖異用者石魏文帝所記諸物相似亂眞者碔砆怪石似美玉蛇牀亂蘼蕪薺苨亂人參杜衡亂細辛雄黄似石流黄鯿魚相亂以有大小相異敵木亂門冬百部似門冬房葵似狼毒鉤吻草與荇華相似拔揳與萆薢相似一名狗脊藥物烏頭天雄附子一物春秋冬夏採各異也逺志苗曰小草根曰逺志芎藭苗曰江蘺根曰芎藭菊有二種苗花如一唯味小異苦者不中食埜葛食之殺人家葛種之三年不收後旅生亦不可食神仙傳云松栢脂入地千年化為茯苓茯苓化為琥珀琥珀一名江珠今泰山出茯苓而無琥珀益州永昌出琥珀而無茯苓或云燒蜂巢所作未詳此二説地黄藍首斷心分根復種皆生女蘿寄生兔絲兔絲寄生木上生根不着地槿花朝生夕死藥論神農經曰上藥養命謂五石之練形六芝之延年也中藥養性合歡蠲忿萱草忘憂下藥治病謂大黄除實當歸止痛夫命之所以延性之所以利病之所以止當其藥應以病也違其藥失其應即怨天尤人説鬼神矣神農經曰藥物有大毒不可入口鼻耳目者即殺人凡六物焉一曰鈎吻似黄精不相連根苗獨生者是也二曰鴟狀如雌雞生中山三曰隂命赤色着木懸其子出海中四曰内童狀如鵞亦生海中五曰鴆羽如雀黒頭赤喙六曰􅶎䖷生海中雄曰䖷雌曰􅶎也神農經曰藥種有五毒一曰狼毒占斯解之二曰巴豆霍汁解之三曰黎盧湯解之四曰天雄烏頭大豆解之五曰班貓戎鹽解之毒菜害小兒乳汁解多食飲二升食忌人啖豆三年則身重行止難啖榆則眠不欲覺啖麥稼令人有力健行飲眞茶令人少眠人常食小豆令人肌肥麤燥食鷰麥令人骨節斷解人食鷰肉不可入水為蛟龍所吞人食冬葵為狗所齧瘡不差或致死馬食穀則足重不能行鴈食粟則翼重不能飛藥術胡粉白石灰等以水和之塗髩鬚不白塗訖着油單裹令温煗候欲燥未燥間洗之湯則不得着晩晩則多折用煖湯洗訖澤塗之欲染當熱洗髩鬚有膩不着藥臨染時亦當拭鬚燥温之陳葵子微火炒令爆咤散著熟地遍蹋之朝種暮生逺不過經宿耳陳葵子秋種覆蓋令經冬不死春有子也周日用曰愚聞熟地植生菜蘭將石流黄篩于其上以盆覆之即時可待又以變白牡丹為五色皆須沃其根以紫草汁則變紫紅花汁則變紅並未試于理可為此出爾雅注燒馬蹄羊角成灰春夏散着濕地生羅勒蠏漆相合成為神仙藥服食方云戲術削氷令圓舉以向日以艾于後承其影則得火取火法如用珠取火多有説者此未試神農本草云雞卵可作琥珀其法取伏卵毈黄白渾雜者煮及尚軟隨意刻作物件以苦酒漬數宿既堅内着粉中佳者乃亂眞矣此世所恒用作無不成者燒白石作白灰既訖積著地經日都冷遇雨及水澆即更燃煙焰起五月五日埋蜻蜓頭于西向户下埋至三日不蝕則化成青眞珠又云埋于正中門蜥蜴或名蝘蜒以器養之食以朱砂體盡赤所食滿七斤治擣萬杵㸃女人肢體終身不滅唯房室事則滅故號守宫傳云東方朔奏漢武帝試之有驗取鼈挫令如碁子大搗赤莧汁和合厚以茅苞五六月中作投地中經旬臠臠盡成鼈也博物志卷四

body:
  text: 博物志卷二晉張華撰外國西海内西北有軒轅國在窮山之際其不壽者八百嵗渚沃之埜鸞自舞民食鳯卵飲甘露白民國有乘黄狀如狐背上有角乘之壽三千嵗君子國人衣冠帶劒使兩虎民衣野絲好禮讓不爭土千里多薫華之草民多疾風氣故人不蕃息好讓故為君子國三苗國昔唐堯以天下讓于虞三苗之民非之帝征之有苗之民叛浮入南海為三苗國驩兠國其民盡似仙人帝堯司徒驩兠之後民常捕海島中人面鳥口去南國萬六千里盡似仙人也大人國其人孕三十六年生白頭其兒則長大能乘雲而不能走蓋龍𩔖去㑹稽四萬六千里厭光國民光出口中形盡似猿猴黒色結胸國有滅䝉鳥竒肱民善為拭扛以殺百禽能為飛車從風逺行湯時西風至吹其車至豫州湯破其車不以視民十年東風至乃復作車遣返而其國去玉門闗四萬里羽民國民有翼飛不逺多鸞鳥民食其卵去九嶷四萬三千里穿胸國昔禹平天下㑹諸侯㑹稽之埜防風氏後到殺之夏德之盛二龍降庭禹使范成光御之行域外既周而還至南海經防風防風之神二臣以塗山之戮見禹便怒而射之迅風雷雨二龍昇去二臣恐以刃自貫其心而死禹哀之乃拔其刃療以不死之草是為穿胸民交趾民在穿胸東孟舒國民人首鳥身其先主為霅氏馴百禽夏后之世始食卵孟舒去之鳯凰隨焉異人河圖玉板云龍伯國人長三十丈生萬八千嵗而死大秦國人長十丈中秦國人長一丈臨洮人長二丈五尺禹致羣臣于㑹稽防風氏後至戮而殺之其骨專車長狄僑如身横九畝長五丈四尺或長十丈秦始皇二十六年有大人十二見于臨洮長五丈足迹六尺東海之外大荒之中有大人國僬僥氏長三丈時含神霧日東北極人長九丈東方有螗螂沃焦防風氏長三丈短人身九寸逺夷之民雕題黒齒穿胸儋耳大足岐首子利國人一手二足拳反曲無啟民居穴食土無男女死埋之其心不朽百年還化為人細民國其肝不朽百年而化為人皆穴居處二國同𩔖也䝉雙民昔高陽氏有同産而為夫婦帝放之北埜相抱而死神鳥以不死草覆之七年男女皆活同頸二頭四手是為䝉雙民有一國亦在海中純女無男又説得一布衣從海浮出其身如中國人衣兩袖長二丈又得一破船隨波出在海岸邊有一人項中復有面生得與語不相通不食而死其地皆在沃沮東大海中南海外有鮫人水居如魚不廢織績其眼能泣珠嘔絲之埜其女子端跪據樹而嘔絲北海外也江陵有猛人能化為虎俗又云虎化為人好着紫葛衣足無踵日南有埜女羣行若丈夫狀皛目裸袒無衣䙏異俗越之東有駭沐之國其長子生則解而食之謂之宜弟父死則負其母而弃之言鬼妻不可與同居周日用曰既其母為鬼妻則其為鬼子亦合弃之矣楚之南有啖人之國其親戚死朽其肉而弃之然後埋其骨乃為孝也秦之西有義渠國其親戚死聚柴積而焚之熏之即煙上謂之登遐然後為孝此上以為政下以為俗中國未足為非也此事見墨子周日用曰此事庶幾佛國之法宜如是乎中國之徒不如是也荆州極西南界至蜀諸民曰獠子媍人姙娠七月而産臨水生兒便置水中浮則取養之沈便弃之然千百多浮既長皆拔去上齒牙各一以為身飾母丘儉遣王領追高句麗王宫盡沃沮東界問其耆老言國人常乘船捕魚遭風吹數十日東得一島上有人言語不相曉其俗常以七夕取童女沈海交州夷名曰俚子俚子弓長數尺箭長尺餘以燋銅為鏑塗毒藥于鏑􅄡中人即死不時斂藏即腹脹沸爛須臾肌肉都盡唯骨耳其俗誓不以此藥法語人治之飲婦人月水及糞汁時有差者唯射猪犬則無恙以其食糞故也燋銅者故燒器其長老唯别燋銅聲以物杵之徐聽其聲得燋毒者便鑿取以為箭鏑景初中蒼梧吏到京云廣州西南接交州數郡桂林晉興寧浦間人有病將死便有飛蟲大如小麥或云有甲在舍上人氣絶來食亡者雖復撲殺有斗斛而來者如風雨前後相尋續不可斷截肌肉都盡唯餘骨在便去盡貧家無相纒者或殯殮不時皆受此弊有物力者則以衣服布帛五六重裹亡者此蟲惡梓木氣即以板鄣防左右并以作器此蟲便不敢近也入交界便無鄰近郡亦有但微少耳異産漢武帝時弱水西國有人乘毛車以渡弱水來獻香者帝謂是常香非中國之所乏不禮其使留久之帝幸上林苑西使至乘輿間并奏其香帝取之看大如鸞卵三枚與棗相似帝不悦以付外庫後長安中大疫宫中皆疫病帝不舉樂西使乞見請燒所貢香一枚以辟疫氣帝不得已聽之宫中病者即日並差長安中百里咸聞香氣芳積九十餘日香猶不歇帝乃厚禮發遣餞送一説漢制獻香不滿斤西使臨去乃發香物如大豆者拭著宫門香氣聞長安數十里經數月乃歇漢武帝時西海國有獻膠五兩者帝以付外庫餘膠半兩西使佩以自隨後從武帝射于甘泉宫帝弓弦斷從者欲更張弦西使乃進乞以所送餘膠續之上左右莫不怪西使乃以口濡膠為水注斷弦兩頭相連注弦遂相著帝乃使力士各引其一頭終不相離西使曰可以射終日不斷帝大怪左右稱竒因名曰續弦膠周書曰西域獻火浣布昆吾氏獻切玉刀火浣布汙則燒之即潔刀切玉如脂布漢世有獻者刀則未聞魏文帝黄初三年武都西都尉王褒獻石膽二十斤四年獻三斤臨卭火井一所從廣五尺深二三丈井在縣南百里昔時人以竹木投以取火諸葛丞相徃視之後火轉盛熱盆蓋井上煮鹽得鹽入于家火即滅訖今不復燃也酒泉延壽縣南山名火泉火出如炬徐公曰西域使王暢説石流黄出足彌山去高昌八百里有石流黄數十丈從廣五六十畝有取流黄晝視孔中上狀如煙而高數尺夜視皆如燈光明高尺餘暢所親見之也言時氣不和皆徃保此山博物志卷二

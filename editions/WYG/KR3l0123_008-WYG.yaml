  text: 欽定四庫令書
  hash: sha256:0ae8a1c111186fa5203bae0eedbc5320da8faa837b9324249d902d2fc730272c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0123_WYG_008-1a, image: WYG1047/WYG1047-0602a.png}
body:
  text: 博物志卷八晉張華撰史補黄帝登仙其臣左徹者削木𧰼黄帝帥諸侯以朝之七年不還左徹乃立顓頊左徹亦仙去也堯之二女舜之二妃曰湘夫人舜崩二妃啼以涕揮竹竹盡斑處士東鬼槐責禹亂天下事禹退作三章彊者攻弱者守攻城圍郭蓋禹始也太姒夢見商之庭産􅁄乃小子發取周庭梓樹樹之于闕間梓化為松栢棫柞覺驚以告文王文王曰慎勿言冬日之陽夏日之隂不召而萬物自來天道尚左日月西移地道尚右水潦東流天不享于殷自發之生于今十年夷羊在牧水潦東流天下飛蝗滿埜命之在周其信然乎武王伐殷舍于畿逢大雨焉革輿三百乘甲三千一日一夜行三百里以戰于牧野成王冠周公使祝雍曰辭達而勿多也祝雍曰近于民逺于佞近于義嗇于時惠于財任賢使能陛下離顯先帝光耀以奉皇天之嘉禄欽順仲夏之吉日遵並大道郊域康阜萬國之休靈始加元服推逺童稚之幼志𢎞積文武之寵德肅勤高祖之清廟六合之内靡不䝉德嵗嵗與天無極右孝昭周成王冠辭止雨祝曰天生五穀以養人民今天雨不止用傷五穀如何如何靈而不幸殺牲以賽神靈雨則不止鳴鼓攻之朱緑繩縈而脅之請雨曰皇皇上天照臨下土集地之靈神降甘雨庶物羣生咸得其所禮記曰孔子少孤不知其父墓母亡問于鄒曼父之母乃合葬于防防墓又崩門人後至孔子問來何遲門人實對孔子不應如是者三乃潸然流涕而止曰古不修墓蔣濟何晏夏侯𤣥王肅皆云無此事注記者謬時賢咸從之周日用曰四士言無者後人何故而述之在愚所見實未之誤矣且徵在與梁紇埜合而生事多隱之况孔子生而父已死既隱何以知之非問曼父之母安得合葬于防也孔子東遊見二小兒辯鬭問其故一小兒曰我以日始出時去人近而日中時逺也一小兒曰我以日出時逺而日中時近一小兒曰日初出時大如車蓋及日中時如盤盂此不為逺者小而近者大乎一小兒曰日初出滄滄涼涼及其中如探湯此不為近者熱而逺者涼乎孔子不能决兩小兒笑曰孰謂汝多知乎亦出列子周日用曰日當中向熱者炎氣直下也譬猶火氣直上而兩旁者其炎凉可悉耳足明初出近而當中逺矣豈聖人不能決乎子路與子貢過鄭神社社樹有鳥神牽率子路子貢説之乃止春秋哀公十有四年春西狩獲麟公羊傳曰有以告者孔子曰孰為來哉孰為來哉盧氏曰以其時非應故孔子泣而感之麟口吐三䇿蓋天使報聖人左傳曰叔孫氏之車子鉏商獲麟以為不祥燕太子丹質于秦秦王遇之無禮不得意思欲歸請于秦王王不聽謬言曰令烏頭白馬生角乃可丹仰而歎烏即頭白俯而嗟馬生角秦王不得已而遣之為機發之橋欲陷丹丹驅馳過之而橋不發遁到闗闗門不開丹為雞鳴于是衆雞悉鳴遂歸詹何以獨繭絲為綸芒針為鉤荆篠為竿剖粒為餌引盈車之魚于百仞之淵汨流之中綸不絶鉤不申竿不撓薛譚學謳于秦青未窮青之㫖于一日遂辭歸秦青乃餞于郊衢撫節悲歌聲震林木響遏行雲薛譚乃謝求返終身不敢言歸秦青顧謂其友曰昔韓娥東之齊匱糧過雍門鬻歌假食而去餘響遶梁三日不絶左右歎其神妙去過逆旅凡人辱之韓娥因曼聲哀哭一里老幼喜歡忭舞弗能自禁乃厚賂而遣之故雍門人至今善歌哭效娥之遺聲也趙襄子率徒十萬狩于中山藉艿燔林燀赫百里有人從石壁中出隨烟上下若無所經涉者襄子以為鬼物徐察之乃人也問其奚道而處石奚道而入火其人曰奚物為石火襄子曰而向之所出者石也所入者火也其人曰不知也魏文侯聞之問于子夏曰彼何人哉子夏曰以商所聞於夫子和者同于物物無得而傷閡者遊金石之間及蹈于水火皆可也文侯曰吾子奚不為之子夏曰刳心去智商未能也雖然試語之有暇矣文侯曰夫子奚不為之子夏曰夫子能而不為之也文侯大悦更羸謂魏王曰臣能射為虚發而下鳥王曰然可試于此乎適聞有鳥從東來羸虚發而下之也澹臺子羽子溺水死欲葬之滅明曰此命也與螻蟻何親與魚鼈何讎遂使勿葬列傳云聶政刺韓相白虹為之貫日要離刺慶忌彗星襲月專諸刺呉王僚鷹擊殿上齊桓公出因與管仲故道自燉煌西涉流沙徃外國沙石千餘里中無水時則有沃流處人莫能知皆乘駱駝駱駝知水脈遇其處輒停不肯行以足蹋地人于其蹋處掘之輒得水楚熊渠子夜行射寢石以為虎伏矢為没羽漢武帝好仙道祭祀名山大澤以求神仙之道時西王母遣使乘白鹿告帝當來乃供帳九華殿以待之七月七日夜漏七刻王母乘紫雲車而至于殿西南面東向頭上太華髻青氣鬱鬱如雲有三青鳥如烏大立侍母旁時設九微燈帝東面西向王母索七桃大如彈丸以五枚與帝母食二枚帝食桃輒以核著膝前母曰取此核將何為帝曰此桃甘美欲種之母笑曰此桃三千年一生實唯帝與母對坐其從者皆不得進時東方朔竊從殿南廂朱鳥牖中窺母母顧之謂帝曰此窺牖小兒甞三來盜吾此桃帝乃大怪之由此世人謂方朔神仙也君山有道與呉包山潛通上有美酒數斗得飲者不死漢武帝齋七日遣男女數十人至君山得酒欲飲之東方朔曰臣識此酒請視之因一飲至盡帝欲殺之朔乃曰殺朔若死此為不驗以其有驗殺亦不死乃赦之博物志卷八

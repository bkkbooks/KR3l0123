  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0123_WYG_003-1a, image: WYG1047/WYG1047-0584c.png}
body:
  text: 博物志卷三晉張華撰異獸漢武帝時大宛之北胡人有獻一物大如狗然聲能驚人雞犬聞之皆走名曰猛獸帝見之怪其細小及出苑中欲使虎狼食之虎見此獸即低頭著地帝為反觀見虎如此謂欲下頭作勢起搏殺之而此獸見虎甚喜䑛唇摇尾徑徃虎頭上立因搦虎面虎乃閉目低頭匍匐不敢動搦鼻下去下去之後虎尾下頭起此獸顧之虎輒閉目後魏武帝伐冒頓經白狼山逢師子使人格之殺傷甚衆王乃自率嘗從軍數百擊之師子哮吼奮起左右咸驚王忽見一物從林中出如狸起上帝車軛師子將至此獸便跳起上師子頭上師子即伏不敢起于是遂殺之得師子一還來至洛陽三千里雞犬皆無鳴吠九真有神牛乃生谿上黒山時共鬭即海沸黄或出鬭岸上家牛皆怖人或遮則霹􅆮號曰神牛昔日南貢四𧰼各有雌雄其一雄死于九眞及至南海百有餘日其雌塗土著身不飲食莝草長史問其所以聞之輒流涕矣越巂國有牛稍割取肉牛不死經日肉生如故大宛國有汗血馬天馬種漢魏西域時有獻者文馬赤鬛身色似若黄金即古之乗黄今謂之露犬也能飛食虎豹蜀山南高山上有物如獼猴長七尺能人行健走名曰猴玃一名化或曰猳玃同行道婦女有好者輒盜之以去人不得知行者或每過其旁皆以長繩相引乃得免此得男子氣自死故取女也取去為室家其年少者終身不得還十年之後形皆𩔖之意亦迷惑不復思歸有子者輒俱送還其家産子皆如人有不食養者其母輒死故無敢不養也及長與人不異皆以楊為姓故今蜀中西界多謂楊率皆猳玃化之子孫大約皆有玃爪者也小山有獸其形如鼓一足如蠡澤有委蛇狀如轂長如轅見之者霸猩猩若黄狗人面能言異鳥崇丘山有鳥一足一翼一目相得而飛名曰䖟見則吉良乘之壽千嵗比翼鳥一青一赤在參嵎山有鳥如烏文首白喙赤足曰精衞故精衞常取西山之木石以填東海越地深山有鳥如鳩青色名曰冶鳥穿大樹作巢如升器其户口徑數寸周飾以土堊赤白相次狀如射侯伐木見此樹即避之去或夜㝠人不見鳥鳥亦知人不見巳也鳴曰咄咄上去明日便宜急上樹去咄咄下去明日便宜急下樹去若使去但言笑而不已者可往伐也若有􅁾惡乃犯其樹者則虎通夕來守人不知者即害人此鳥白日見其形鳥也夜聽其鳴人也時歡樂便作人悲喜形長三尺澗中取石蠏就人火間炙之不可犯也越人謂此鳥為越祝之祖異蟲南方有落頭蟲其頭能飛其種人常有所祭祀其蟲即至故因取之焉其飛因晚便去以耳為翼將曉還復著體呉時徃徃得此蟲也江南山谿水中射工蟲甲𩔖也長一二寸口中有弩形氣射人影隨所著處發瘡不治則殺人今蠼螋蟲溺人影亦隨所著處生瘡盧氏曰以雞䁑草搗塗經日即愈周日用曰萬物皆有所相感愚聞以霹􅆮木擊鳥影其鳥應時落地雖未嘗試以是𩔖推必有之蝮蛇秋月毒盛無所蜇螫嚙草木以泄其氣草木即死人樵採設為草木所傷刺者亦殺人毒甚于蝮齧謂之蛇迹也華山有蛇名肥遺六足四翼見則天下大旱常山之蛇名率然有兩頭觸其一頭頭至觸其中則兩頭俱至孫武以喻善用兵者異魚南海有鰐魚狀似鼉斬其頭而乾之去齒而更生如此者三乃止東海中有牛體魚其形狀如牛剥其皮懸之潮水至則毛起潮水去則毛伏東海蛟錯魚生子子驚還入母腸尋復出呉王江行食鱠有餘弃于中流化為魚今魚中有名呉王鱠餘者長數寸大者如筯猶有鱠形廣陵陳登食膾作病華佗下之膾頭皆成蟲尾猶是膾東海有物狀如凝血從廣數尺方員名曰鮓魚無頭目處所内無臟衆蝦附之隨其東西人煮食之異草木太原晉陽以北生屏風草海上有草焉名蒒其實食之如大麥七月稔俗名曰自然穀或曰禹餘糧蒒音師堯時有屈軼草生于庭佞人入朝則屈而指之又名指佞草右詹山草帝女所化其葉鬱茂其華黄實如豆服者媚于人止些山多竹長千仞鳯食其實去九疑萬八千里江南諸山郡中大樹斷倒者經春夏生菌謂之椹食之有味而每毒殺人云此物徃徃自生毒或云蛇所著之物楓樹生者啖之令人笑不得止治之飲土漿即愈博物志卷三

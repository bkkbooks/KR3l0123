body:
  text: 博物志卷五晉張華撰方士魏武帝好養性法亦解方藥招引四方之術士如左元放華佗之徒無不畢至周日用曰操雖好竒而心無道如何招引方術之人乎如囚左元放而將欲殺之若非變化必至滅身故有道者不合親之矣既要試術則何可乎魏王所集方士名上黨王眞隴西封君達甘陵甘始魯女生譙國華佗字元化東郭延年唐霅冷壽光河南卜式張貂薊子訓汝南費長房鮮奴辜魏國軍吏河南趙聖卿陽城郄儉字孟節廬江左慈字元放右十六人魏文帝東阿王仲長統所説皆能斷穀不食分形隱没出入不由門户左慈能變形幻人視聽厭勝鬼魅皆此𩔖也周禮所謂怪民王制稱挾左道者也魏時方士甘陵甘始廬江有左慈陽城有郄儉始能行氣導引慈曉房中之術善辟穀不食悉號二百嵗人凡如此之徒武帝皆集之于魏不使遊散甘始老而少容曹子建密問其所行始言本師姓韓字世雄嘗與師于南海作金投數萬斤于海又取鯉一雙一鯉傅藥遊釜中若處淵其無藥者已熟而食言此藥去此踰逺萬里已不可行人不能得也皇甫隆遇青牛道士姓封名君達其與養性法皆可倣用大略云體欲常少勞無過虚食去肥濃節酸鹹減思慮損喜怒除馳逐慎房室春夏泄瀉秋冬閉藏詳别篇武帝行之有效文帝典論曰陳思王曹植辯道論云世有方士悉招至之甘陵有甘始廬江有左慈陽城有郄儉始能行氣儉善辟穀悉號二百嵗人自王與太子及余之兄弟咸以為調笑不全信之然甞試郄儉辟穀百日同與寢處行步起居自若也夫人不食七日則死而儉乃能如是左慈脩房中之術可以善終命然非有至情莫能行也甘始老而少容自諸術士咸共歸之王使郄孟節主領諸人近魏明帝時河東有焦生者裸而不衣處火不燋入水不凍杜恕為太守親所聞見皆有實事周日用曰焦孝然邇河居一菴大雪菴倒人以為死而視之蒸氣于雪畧無變色時或析薪惠人而已故魏書云自羲皇以來一人而已潁川陳元方韓元長時之通才也所以並信有仙者其兒時所傳聞河南密縣有成公其人出行不知所至復來還語其家云我得仙因與家人辭訣而去其步漸高良久乃没而不見至今密縣傳其仙去二君並信有仙蓋由此也周日用曰豈惟二子乎桓譚新論説方士有董仲君罪繫獄佯死臭自户出既而復生黄帝問天老曰天地所生豈有食之令人不死者乎天老曰太陽之草名曰黄精餌而食之可以長生太隂之草名曰鉤吻不可食入口立死人信鉤吻之殺人不信黄精之益壽不亦惑乎周日用曰草既殺人仍無益壽者也若殺人無驗則益壽不可信矣服食左元放荒年法擇大豆粗細調勻必煮熟按之令有光焰氣徹豆心内先不食一日以冷水頓服訖其魚肉菜果不得復經口渴即飲水慎不可煖飲初小困十數日後體力壯健不復思食一法服三升為劑亦當隨人先食多少増損之豐年欲復食者煮葵子及脂蘇服肉羮漸漸飲之須豆下乃可食豆未盡而以實物塞腸則殺人矣此未試或可以然周日用曰一法蠟塗黏餅炙餅令熟即塗之以意量多少即食之如常渴即飲冷水忌熱茶耳孔子家語曰食水者乃耐寒而善浮食土者無心而不息食木者多力而不治食石者肥澤而不老食草者善走而愚食桑者有緒而蛾食肉者勇毅而悍食氣者神明而壽食穀者智慧而夭不食者不死而神仙傳曰雜食者百病妖邪之所鍾焉西域有蒲萄酒積年不敗彼俗云可十年飲之醉彌月乃解所食逾少心逾開所食逾多心逾塞年逾損焉辨方士漢淮南王謀反被誅亦云得道輕舉周日用曰漢書云淮南自刑應不然乎得道輕舉非虚事也至今維揚境内馬迹猶存且日與八公同處皆上品眞人耳既談道德肯圖叛逆之事况恒行隂德好書藝不善弋獵淮南内書言神仙黄白之術去反事逺矣夫古今書傳多黜仙道者慮帝王公侯廢萬幾而慕其道故隱而不書唯老耼不可掩而云三百嵗後西遊流沙不知所之庾書云蜀有女道士謝自然白日上昇此外歴代史籍未嘗言也鉤弋夫人被殺于雲陽而言尸解柩空周日用曰史云夫人死大風拔樹揚沙揭石亦不云尸解柩空文帝典論云議郎李覃學郄儉辟穀服茯苓飲水中寒泄痢殆至殞命軍祭酒𢎞農董芬學甘始鴟視狼顧呼吸吐納為之過差氣閉不通良久乃蘇寺人嚴峻就左慈學補導之術閹竪眞無事于斯而逐聲若此又云王仲統云甘始左元放東郭延年行容成御婦人法並為丞相所録間行其術亦得其驗降就道士劉景受雲母九子元方年三百嵗莫知所在武帝恒御此藥亦云有驗劉德治淮南王獄得枕中鴻寳秘書及子向緘而竒之信黄白之術可成謂神仙之道可致卒亦無驗乃以罹罪也周日用曰神仙之道學之匪一朝一夕而可得黄白者也仍須有分昇騰者應須有骨安可偶然而得效也劉根不覺饑渴或謂能忍盈虚王仲都當盛夏之月十爐火炙之不熱當嚴冬之時裸之而不寒恒山君以為性耐寒暑恒山以為無仙道好竒者為之前者已述焉司馬遷云無堯以天下讓許由事揚雄亦云誇大者為之揚雄又云無仙道桓譚亦同博物志卷五

body:
  text: 博物志卷十晉張華撰雜説下婦人姙娠未滿三月着壻衣冠平旦左遶井三匝暎祥影而去勿反顧勿令人知見必生男周日用曰知女則可依法或先是男如何余聞有定法定母年日月與受胎時日算之遇竒則為男遇偶則為女知為女胎即可依法婦人姙身不欲令見醜惡物異𩔖鳥獸食當避其異常味不欲令見熊羆虎豹并及射鳥射雉食牛心白犬肉鯉魚頭席不正不坐割不正不食聽誦詩書諷詠之音不聽淫聲不視邪色以此産子必賢明端正壽考所謂父母胎教之法盧氏曰子之得清純滋液則生仁聖得錯亂之氣則生貪淫子因母氣也故古者婦人姙娠必慎所感感于善則善感于惡則惡矣姙娠者不可啖兔肉又不可見兔令兒唇缺又不可啖生薑令兒多指異説云瞽瞍夫婦凶頑而生舜叔梁紇淫夫也徵在失行也加又野合而生仲尼焉安在有胎教也盧氏曰夫甲及寅年生者聖以年在嵗德在甲寅之年生者則然矣亦由先天也亦由父母氣也古者元氣清故多聖今者俗淫隂濁故無聖人也豫章郡衣冠人有數婦暴面于道尋道爭分銖以給其夫輿馬衣資及舉孝亷更取富者一切皆給先者雖有數年之勤婦子滿堂室猶放黜以避後人諸逺方山郡幽僻處出蜜蠟人徃徃以桶聚蜂每年一取逺方諸山蜜蠟處以木為器中開小孔以蜜蠟塗器内外令遍春月蜂將生育時捕取三兩頭著器中蜂飛去尋將伴來經日漸益遂持器歸人藉帶眠者則夢蛇鳥銜人之髮夢飛王尒張衡馬均皆冒重霧行一人無恙一人病一人死問其故無恙人曰我飲酒病者食死者空腹人以冷水自漬至膝可頓啖數十枚瓜漬至腰啖轉多至頸可啖百餘枚所漬水皆作瓜氣味此事未試人中酒不解治之以湯自漬即愈湯亦作酒氣味也昔劉𤣥石于中山酒家沽酒酒家與千日酒忘言其節度歸至家當醉而家人不知以為死也權葬之酒家計千日滿乃憶𤣥石前來酤酒醉當醒耳徃視之云𤣥石亡來三年已葬于是開棺醉始醒俗云𤣥石飲酒一醉千日舊説云天河與海通近世有人居海濵者年年八月有浮槎去來不失期人有竒志立飛閣于槎上多齎糧乘槎而去十餘日中猶觀星月日辰自後芒芒忽忽亦不覺晝夜去十餘日奄至一處有城郭狀屋舍甚嚴遙望宫中多織婦見一丈夫牽牛渚次飲之牽牛人乃驚問曰何由至此此人具説來意并問此是何處答曰君還至蜀郡訪嚴君平則知之竟不上岸因還如期後至蜀問君平曰某年月日有客星犯牽牛宿計年月正是此人到天河時也人有山行墮深澗者無出路飢餓欲死左右見龜蛇甚多朝暮引頸向東方人因伏地學之遂不飢體殊輕便能登巖岸經數年後竦身舉臂遂超出澗上即得還家顔色悦懌頗更黠慧勝故還食穀啖滋味百餘日中復本質天門郡有幽山峻谷而其土人有從下經過者忽然踊出林表狀如飛仙遂絶迹谷中如此甚數遂名此處為仙谷有樂道好事者入此谷中洗沐以求飛仙徃徃得去有長生意思人疑恐是妖怪乃以大石自墜牽一犬入谷中犬復飛去其人還告鄉里募數十人執杖揭山草伐木至山頂觀之遙見一物長數十丈其高隱人耳如簸箕格射刺殺之所吞人骨積此左右已成封其蟒開口廣丈餘前後失人皆此蟒氣所噏上于是此地遂安穩無患博物志卷十

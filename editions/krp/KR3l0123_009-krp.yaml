body:
  text: 博物志卷九晉張華撰雜説上老子云萬民皆付西王母唯王者聖人真人仙人道人之命上屬九天君耳黄帝治天下百年而死民畏其神百年以其數百年故曰黄帝三百年上古男子三十而妻女二十而嫁曽子曰弟子不學古知之矣貧者不勝其憂富者不勝其樂昔西夏仁而去兵城郭不脩武士無位唐伐之西夏亡昔者𤣥都賢鬼神道廢人事其謀臣不用龜䇿是從忠臣無禄神巫用國榆烱氏之君孤而無徒曲沃進伐之以亡昔有巢氏有臣而貴任之專國主斷已而奪之臣怒而生變有巢氏以亡昔者清陽强力貴美女不治國而亡昔有洛氏宫室無常囿池廣大人民困匱商伐之有洛以亡神仙傳曰説上據箕尾為宿嵗星降為東方朔傅説死後有此宿東方生無嵗星曽子曰好吾者知吾美矣惡我者知吾惡矣思士不妻而感思女不夫而孕后稷生乎巨跡伊尹生乎空桑箕子居朝鮮其後伐燕復之朝鮮亡入海為鮮國師兩妻黒色珥兩青蛇蓋勾芒也漢興多瑞應至武帝之世特甚麟鳯數見王莽時郡國多稱瑞應嵗嵗相尋皆由順時之欲承㫖求媚多無實應乃使人猜疑子胥伐楚燔其府庫破其九龍之鐘蓍一千嵗而三百莖其本以老故知吉凶蓍末大于本為上吉筮必沐浴齋潔焚香每月望浴蓍必五浴之浴龜亦然明夷曰昔夏后筮乘飛龍而登于天而使華陶占之陶曰吉昔夏啟筮徙九鼎啟果徙之昔舜筮登天為神占之有黄龍神曰不吉武王伐殷而占於蓍老蓍老曰吉桀筮伐唐而占於熒惑曰不吉昔鯀筮注洪水而占於大明曰不吉有初無後蓍末大于本為上吉次蒿次荆皆如是龜蓍皆月望浴之水之怪為龍罔象木石之怪為躨魍魎土之怪為墳羊火之怪為宋無忌鬭戰死亡之處其人馬血積年化為燐燐著地及草木如露略不可見行人或有觸者著人體便有光拂拭便分散無數愈甚有細咤聲如炒豆唯靜住良久乃滅後其人忽忽如失魂經日乃差今人梳頭著髻時有隨梳解結有光者亦有咤聲風山之首方高三百里風穴如電突深三十里春風自此而出也何以知還風也假令東風雲反從西來詵詵而疾此不旋踵立西風矣所以然者諸風皆從上而下或薄于雲雲行疾下雖有微風不能勝上上風來則反矣春秋書鼷鼠食郊牛牛死鼷鼠𩔖最小者食物當時不覺痛世傳云亦食人項肥厚皮處亦不覺或名甘鼠俗人諱此所嚙衰病之徵鼠食巴豆三年重三十斤博物志卷九

body:
  text: 博物志卷九臨卭有火井一所從廣五尺深二三丈在縣南百里昔時人以竹木投以取火諸葛丞相往視之後火轉盛執盆蓋井上煮水多得鹽入以家火即滅訖今不復燃也酒泉延壽縣南山名火泉火出如炬徐公曰西域使王暢說石流黃出且彌山去高昌八百里有石流黃高數十丈從廣五六十畝有取石流黃孔穴晝視其孔上狀如青煙常高數尺夜視皆如燃燈光明高尺餘暢所視見也且彌人言時氣不和皆往保此山毒氣自減魏文帝黃初三年武都西部都尉王褒獻石膽三十斤四年獻三斤九真有神牛乃生溪上黑夜出時時其鬭即海沸黃昏或出鬭岸上家牛皆怖人或遮捕則霹靂號曰神牛日南有野女群行覓丈夫其狀皛且自裸袒無衣襦昔日南貢四象各有雌雄其一雄死百有餘日其雌塗土著身不飲食坐臥草中問其所以聞之輒流涕矣南方有落頭民其頭能飛其種人常有所祭祀號曰蟲落故因取名焉以其頭飛因眼便去以耳為翼將曉還復著體吳時往往得此人也東海中有牛魚其形狀如牛剝其皮懸之潮水至則毛起潮去則毛伏南海有鰐魚狀似鼉斬其頭而乾之去齒而更生如此者三乃止屠黿解其肌肉唯腸連其頭而經日不死猶能齧物鳥往食之則為所得漁者或以張鳥雀遇神蛇能斷而復續無啓民居穴食土無男女死埋之其心不朽百年還化為人鏐民其肺不朽百年復生細民其肝不朽百年而化為人皆穴居處三國同類也南海外有鮫人水居如魚不廢織績其眼能泣珠蜀山南高山上有物如獼猴長七尺能人行健走名曰猴玃一名馬化或曰猳玃伺行道婦女有好者輒盜之以去人不得知行者或每遇其旁皆以長繩相引然故不免此物能別男女氣臭故取女不取男也取去為室家其無子者終身不得還十年之後形皆類之意亦迷惑不復思歸有子者輒俱送還其家産子皆如人有不食養者其母輒死故無敢不養也及長與人不異皆以楊為姓故今蜀中西界多謂楊姓者率皆猳玃馬化之子孫時時相有玃爪者也越地深山有鳥如鳩青色名曰冶鳥穿大樹作巢如升器其戶口徑數寸周飾以土堊赤白相次狀如射侯伐木見此樹即避之去或夜冥人不見鳥鳥亦知人不見己也鳴曰咄咄上去明日便宜急上樹去咄咄下去明日便宜急下若使去但言笑而不已者可止伐也若有穢惡及犯其止者則虎通夕來守人不知者即害人此鳥白日見其形鳥也夜聽其鳴人也時觀樂便作人悲喜形長三尺澗中取石蟹就人火間炙之不可犯也越人謂此鳥為越祝之祖交州夷名曰俚子俚子弓長數尺箭長尺餘以燋銅為鏑塗毒藥於鏑鋒中人即死不時斂藏即胮脹沸爛須臾肌肉都盡唯骨在耳其俗誓不以此藥法語人治之飲婦人月水及糞汁時有差者唯射豬犬者無他以其食糞故也燋銅者故燒器其長老唯別燋銅聲以物杵之徐聽其聲得燋毒者便鑿取以為箭鏑蝮蛇秋月毒盛無所蜇螫嚙草木以泄其氣草木即死人樵採設為此草木所傷刺者亦殺人毒始於蝮齧謂之蛇迹也江南諸山郡中大樹斷倒者經春夏生菌謂之椹食之有味而忽毒殺人云此物往往自有毒者或云蛇所著之楓樹生者啖之令人笑不得止治之飲土漿多愈人以冷水自漬至膝可頓啖數十枚瓜漬至腰啖轉多至頸可啖百餘枚所漬水皆作瓜氣味此事未試人中酒不解治之以湯自漬即愈湯亦作酒氣味也平原管輅善卜筮解鳥語漢中興士人皆冠葛巾建安中魏武帝造白帢於是遂廢唯二學書生猶著也
